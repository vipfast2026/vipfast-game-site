<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - 糖果乐园</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: sans-serif;
        }
        h1 { color: #fff; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .stats {
            display: flex;
            gap: 20px;
            color: #fff;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .game-board {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 10px;
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-gap: 10px;
        }
        .cell {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            transition: transform 0.15s, background 0.15s;
        }
        .cell.new { animation: pop 0.2s; }
        .cell.merged { animation: pop 0.3s; }
        @keyframes pop {
            0% { transform: scale(0.5); }
            100% { transform: scale(1); }
        }
        .btn {
            margin-top: 15px;
            padding: 12px 30px;
            font-size: 16px;
            background: rgba(255,255,255,0.3);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
        .btn:hover { background: rgba(255,255,255,0.4); }
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .game-over h2 { color: #667eea; margin-bottom: 15px; }
        .controls { color: rgba(255,255,255,0.8); margin-top: 15px; font-size: 14px; }

        /* 数字颜色 */
        .v2 { background: #eee4da; color: #776e65; }
        .v4 { background: #ede0c8; color: #776e65; }
        .v8 { background: #f2b179; color: #fff; }
        .v16 { background: #f59563; color: #fff; }
        .v32 { background: #f67c5f; color: #fff; }
        .v64 { background: #f65e3b; color: #fff; }
        .v128 { background: #edcf72; color: #fff; }
        .v256 { background: #edcc61; color: #fff; }
        .v512 { background: #edc850; color: #fff; }
        .v1024 { background: #edc53f; color: #fff; }
        .v2048 { background: #edc22e; color: #fff; }
    </style>
</head>
<body>
    <h1>🔢 2048</h1>
    <div class="stats">
        <span>分数：<strong id="score">0</strong></span>
        <span>最高：<strong id="best">0</strong></span>
    </div>
    <div class="game-board" id="board"></div>
    <button class="btn" onclick="initGame()">🔄 新游戏</button>
    <div class="controls">使用 ↑↓←→ 或 WASD 移动</div>

    <div class="game-over" id="gameOver">
        <h2>游戏结束!</h2>
        <p>得分：<span id="finalScore">0</span></p>
        <button class="btn" onclick="initGame()">再玩一次</button>
    </div>

    <script>
        let board = [];
        let score = 0;
        let best = localStorage.getItem('2048best') || 0;
        document.getElementById('best').textContent = best;

        function initBoard() {
            board = Array(4).fill(null).map(() => Array(4).fill(0));
            addNewTile();
            addNewTile();
            render();
        }

        function addNewTile() {
            const empty = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (board[r][c] === 0) empty.push({r, c});
                }
            }
            if (empty.length > 0) {
                const {r, c} = empty[Math.floor(Math.random() * empty.length)];
                board[r][c] = Math.random() < 0.9 ? 2 : 4;
                return {r, c};
            }
            return null;
        }

        function render(newTile, mergedTiles) {
            const container = document.getElementById('board');
            container.innerHTML = '';
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    const val = board[r][c];
                    if (val > 0) {
                        cell.textContent = val;
                        cell.classList.add('v' + val);
                        if (newTile && newTile.r === r && newTile.c === c) {
                            cell.classList.add('new');
                        }
                        if (mergedTiles && mergedTiles.some(t => t.r === r && t.c === c)) {
                            cell.classList.add('merged');
                        }
                    }
                    container.appendChild(cell);
                }
            }
            document.getElementById('score').textContent = score;
        }

        function slide(row) {
            let arr = row.filter(x => x !== 0);
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i+1]) {
                    arr[i] *= 2;
                    score += arr[i];
                    arr.splice(i+1, 1);
                }
            }
            while (arr.length < 4) arr.push(0);
            return arr;
        }

        function moveLeft() {
            let moved = false;
            for (let r = 0; r < 4; r++) {
                const old = [...board[r]];
                board[r] = slide(board[r]);
                if (old.join(',') !== board[r].join(',')) moved = true;
            }
            return moved;
        }

        function moveRight() {
            let moved = false;
            for (let r = 0; r < 4; r++) {
                const old = [...board[r]];
                board[r] = slide(board[r].reverse()).reverse();
                if (old.join(',') !== board[r].join(',')) moved = true;
            }
            return moved;
        }

        function moveUp() {
            let moved = false;
            for (let c = 0; c < 4; c++) {
                const col = [board[0][c], board[1][c], board[2][c], board[3][c]];
                const old = [...col];
                const newCol = slide(col);
                for (let r = 0; r < 4; r++) board[r][c] = newCol[r];
                if (old.join(',') !== newCol.join(',')) moved = true;
            }
            return moved;
        }

        function moveDown() {
            let moved = false;
            for (let c = 0; c < 4; c++) {
                const col = [board[0][c], board[1][c], board[2][c], board[3][c]];
                const old = [...col];
                const newCol = slide(col.reverse()).reverse();
                for (let r = 0; r < 4; r++) board[r][c] = newCol[r];
                if (old.join(',') !== newCol.join(',')) moved = true;
            }
            return moved;
        }

        function checkGameOver() {
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (board[r][c] === 0) return false;
                    if (c < 3 && board[r][c] === board[r][c+1]) return false;
                    if (r < 3 && board[r][c] === board[r+1][c]) return false;
                }
            }
            return true;
        }

        function handleMove(direction) {
            let moved = false;
            switch(direction) {
                case 'left': moved = moveLeft(); break;
                case 'right': moved = moveRight(); break;
                case 'up': moved = moveUp(); break;
                case 'down': moved = moveDown(); break;
            }
            if (moved) {
                const newTile = addNewTile();
                render(newTile);
                if (checkGameOver()) {
                    if (score > best) {
                        best = score;
                        localStorage.setItem('2048best', best);
                        document.getElementById('best').textContent = best;
                    }
                    document.getElementById('finalScore').textContent = score;
                    document.getElementById('gameOver').style.display = 'block';
                }
            }
        }

        function initGame() {
            document.getElementById('gameOver').style.display = 'none';
            score = 0;
            initBoard();
        }

        document.addEventListener('keydown', (e) => {
            if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) {
                e.preventDefault();
            }
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W': handleMove('up'); break;
                case 'ArrowDown': case 's': case 'S': handleMove('down'); break;
                case 'ArrowLeft': case 'a': case 'A': handleMove('left'); break;
                case 'ArrowRight': case 'd': case 'D': handleMove('right'); break;
            }
        });

        // 触摸控制
        let startX, startY;
        document.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - startX;
            const dy = e.changedTouches[0].clientY - startY;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > 30) handleMove(dx > 0 ? 'right' : 'left');
            } else {
                if (Math.abs(dy) > 30) handleMove(dy > 0 ? 'down' : 'up');
            }
        });

        initGame();
    </script>
</body>
</html>
