<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>篮球投篮 - 糖果乐园</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: sans-serif;
            touch-action: none;
        }
        body.iframe-mode {
            padding: 0;
            background: transparent;
        }
        body.iframe-mode .game-container {
            border-radius: 0;
            box-shadow: none;
        }
        body.iframe-mode h1, body.iframe-mode .instructions { display: none; }
        h1 { color: #fff; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .stats {
            display: flex;
            gap: 30px;
            color: #fff;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .combo-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: bold;
            color: #f1c40f;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        .game-container {
            position: relative;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        canvas { display: block; }
        .power-bar {
            position: absolute;
            left: 20px;
            bottom: 20px;
            width: 30px;
            height: 150px;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,0.5);
        }
        .power-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(0deg, #2ecc71, #f1c40f, #e74c3c);
            transition: height 0.05s linear;
        }
        .power-arrow {
            position: absolute;
            left: 55px;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 12px solid #fff;
            transition: bottom 0.05s linear;
        }
        .btn {
            margin-top: 15px;
            padding: 12px 30px;
            font-size: 16px;
            background: rgba(255,255,255,0.3);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
        .btn:hover { background: rgba(255,255,255,0.4); }
        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .message.show { opacity: 1; animation: popUp 0.5s; }
        @keyframes popUp {
            0% { transform: translate(-50%, -50%) scale(0.5); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        .instructions {
            color: rgba(255,255,255,0.8);
            margin-top: 10px;
            font-size: 14px;
        }
        .game-over-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            color: white;
            display: none;
            z-index: 100;
        }
        .game-over-panel h2 { font-size: 28px; margin-bottom: 15px; color: #f1c40f; }
        .game-over-panel p { margin: 10px 0; font-size: 18px; }
        .game-over-panel button {
            margin-top: 20px;
            padding: 10px 25px;
            font-size: 16px;
            background: linear-gradient(135deg, #f1c40f, #e67e22);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🏀 篮球投篮</h1>
    <div class="stats">
        <span>得分：<strong id="score">0</strong></span>
        <span>连击：<strong id="combo">0</strong></span>
        <span>最佳：<strong id="best">0</strong></span>
    </div>
    <div class="game-container">
        <canvas id="game" width="400" height="500"></canvas>
        <div class="combo-display" id="comboDisplay"></div>
        <div class="power-bar">
            <div class="power-fill" id="powerFill"></div>
        </div>
        <div class="power-arrow" id="powerArrow"></div>
        <div class="message" id="message"></div>
        <div class="game-over-panel" id="gameOverPanel">
            <h2>🏀 游戏结束!</h2>
            <p>最终得分：<span id="finalScore">0</span></p>
            <p>最高连击：<span id="finalCombo">0</span></p>
            <button onclick="initGame()">再来一局</button>
        </div>
    </div>
    <button class="btn" onclick="initGame()">🔄 重新开始</button>
    <p class="instructions">按住空格或点击屏幕蓄力，松开投篮 | 连续投中可触发连击奖励!</p>

    <script>
        // 检测是否在 iframe 中
        if (window.self !== window.top) {
            document.body.classList.add('iframe-mode');
        }

        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        // 游戏状态
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let bestScore = localStorage.getItem('basketballBest') || 0;
        let attempts = 0;
        let gameActive = true;
        let charging = false;
        let power = 0;
        let powerDirection = 1;
        let ball = null;
        let hoop = null;
        let particles = [];
        let hoopMoving = true;

        // 篮筐
        class Hoop {
            constructor() {
                this.x = 280;
                this.y = 120;
                this.width = 70;
                this.speed = 0.8;
                this.direction = 1;
                this.backboardX = 360;
                this.backboardY1 = 90;
                this.backboardY2 = 150;
            }

            update() {
                if (hoopMoving) {
                    this.x += this.speed * this.direction;
                    if (this.x <= 200 || this.x >= 340) {
                        this.direction *= -1;
                    }
                }
                this.backboardX = this.x + this.width - 10;
            }

            draw() {
                // 篮板
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.fillRect(this.backboardX, this.backboardY1, 10, this.backboardY2 - this.backboardY1);
                ctx.strokeStyle = '#e74c3c';
                ctx.lineWidth = 3;
                ctx.strokeRect(this.backboardX, this.backboardY1, 10, this.backboardY2 - this.backboardY1);

                // 篮筐支架
                ctx.beginPath();
                ctx.moveTo(this.x + this.width, this.y);
                ctx.lineTo(this.backboardX, this.y - 20);
                ctx.strokeStyle = '#7f8c8d';
                ctx.lineWidth = 5;
                ctx.stroke();

                // 篮筐
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.width, this.y);
                ctx.strokeStyle = '#e67e22';
                ctx.lineWidth = 6;
                ctx.stroke();

                // 篮网
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + 15, this.y + 50);
                ctx.lineTo(this.x + this.width - 15, this.y + 50);
                ctx.lineTo(this.x + this.width, this.y);
                ctx.strokeStyle = 'rgba(255,255,255,0.7)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // 篮网网格
                for (let i = 1; i < 4; i++) {
                    const x1 = this.x + (this.width / 4) * i;
                    const x2 = this.x + 15 + ((this.width - 30) / 4) * i;
                    ctx.beginPath();
                    ctx.moveTo(x1, this.y);
                    ctx.lineTo(x2, this.y + 50);
                    ctx.stroke();
                }
            }
        }

        // 篮球
        class Ball {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 22;
                this.vx = 0;
                this.vy = 0;
                this.rotation = 0;
                this.inAir = false;
                this.scored = false;
            }

            shoot(power, angle) {
                // power 范围 0-100，转换为合适的速度
                // 最佳力度 80% 时，速度约 20
                const speed = 8 + power * 0.15;
                // 角度已经是度数，转换为弧度
                const radian = angle * Math.PI / 180;
                this.vx = Math.cos(radian) * speed;  // 向右
                this.vy = Math.sin(radian) * speed;  // 向上（负值）
                this.inAir = true;
            }

            update() {
                if (!this.inAir) return;

                // 重力
                this.vy += 0.2;
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.vx * 0.15;

                // 篮板碰撞
                if (this.x + this.radius > hoop.backboardX &&
                    this.y > hoop.backboardY1 && this.y < hoop.backboardY2 &&
                    this.vx > 0) {
                    this.vx = -this.vx * 0.6;
                    this.x = hoop.backboardX - this.radius;
                    createParticles(this.x + this.radius, this.y, 5, '#fff');
                }

                // 篮筐碰撞
                const rimY = hoop.y;
                const rimLeftX = hoop.x;
                const rimRightX = hoop.x + hoop.width;

                // 左筐沿
                if (Math.abs(this.y - rimY) < 10 && this.x > rimLeftX - 10 && this.x < rimLeftX + 10) {
                    if (this.vx > 0) {
                        this.vx = -this.vx * 0.4;
                        this.vy *= 0.8;
                        createParticles(this.x, this.y, 3, '#e67e22');
                    }
                }
                // 右筐沿
                if (Math.abs(this.y - rimY) < 10 && this.x > rimRightX - 10 && this.x < rimRightX + 10) {
                    if (this.vx < 0) {
                        this.vx = -this.vx * 0.4;
                        this.vy *= 0.8;
                        createParticles(this.x, this.y, 3, '#e67e22');
                    }
                }

                // 检测是否得分
                if (!this.scored && this.vy > 0 &&
                    this.x > hoop.x + 15 && this.x < hoop.x + hoop.width - 15 &&
                    this.y > hoop.y && this.y < hoop.y + 30) {
                    this.scored = true;
                    combo++;
                    if (combo > maxCombo) maxCombo = combo;

                    // 连击奖励
                    let points = 2;
                    let bonusText = '+2';
                    let color = '#2ecc71';

                    if (combo >= 3) { points = 6; bonusText = '🔥 x3! +6'; color = '#e74c3c'; }
                    else if (combo >= 5) { points = 10; bonusText = '🔥🔥 x5! +10'; color = '#f39c12'; }
                    else if (combo >= 8) { points = 15; bonusText = '🔥🔥🔥 x8! +15'; color = '#9b59b6'; }
                    else if (combo >= 10) { points = 20; bonusText = '💯 PERFECT! +20'; color = '#1abc9c'; }

                    score += points;
                    showMessage(bonusText, color);
                    createParticles(this.x, this.y + 20, 15, '#f1c40f');

                    // 更新连击显示
                    if (combo >= 2) {
                        document.getElementById('comboDisplay').textContent = `连击 x${combo}!`;
                        document.getElementById('comboDisplay').style.opacity = 1;
                        setTimeout(() => {
                            document.getElementById('comboDisplay').style.opacity = 0;
                        }, 1500);
                    }
                }

                // 落地
                if (this.y > canvas.height - this.radius) {
                    this.y = canvas.height - this.radius;
                    this.vy = -this.vy * 0.4;
                    this.vx *= 0.7;

                    if (Math.abs(this.vy) < 1) {
                        this.inAir = false;
                        setTimeout(endShot, 300);
                    }
                }

                // 出界
                if (this.x > canvas.width + 100 || this.x < -100 || this.y > canvas.height + 50) {
                    endShot();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // 篮球主体
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#e67e22';
                ctx.fill();
                ctx.strokeStyle = '#d35400';
                ctx.lineWidth = 2;
                ctx.stroke();

                // 篮球纹理
                ctx.beginPath();
                ctx.moveTo(-this.radius, 0);
                ctx.quadraticCurveTo(0, -10, this.radius, 0);
                ctx.strokeStyle = '#d35400';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, -this.radius);
                ctx.lineTo(0, this.radius);
                ctx.stroke();

                ctx.restore();
            }
        }

        // 粒子效果
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1;
                this.color = color;
                this.size = Math.random() * 6 + 2;
            }

            update() {
                this.vy += 0.3;
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.03;
            }

            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function createParticles(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function initGame() {
            score = 0;
            combo = 0;
            maxCombo = 0;
            attempts = 0;
            gameActive = true;
            particles = [];
            hoop = new Hoop();
            ball = new Ball(80, 400);

            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;
            document.getElementById('best').textContent = Math.max(bestScore, localStorage.getItem('basketballBest') || 0);
            document.getElementById('comboDisplay').style.opacity = 0;
            document.getElementById('gameOverPanel').style.display = 'none';

            gameLoop();
        }

        function showMessage(text, color) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.style.color = color;
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 800);
        }

        function endShot() {
            if (!ball.scored) {
                combo = 0;
                document.getElementById('comboDisplay').textContent = '';
            }

            attempts++;
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;

            // 每 5 球增加难度（轻微增加）
            if (attempts % 5 === 0 && hoop.speed < 1.2) {
                hoop.speed += 0.05;
                showMessage('难度提升!', '#e74c3c');
            }

            // 游戏结束条件：30 球
            if (attempts >= 30) {
                gameActive = false;
                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('basketballBest', bestScore);
                }
                document.getElementById('finalScore').textContent = score;
                document.getElementById('finalCombo').textContent = maxCombo;
                document.getElementById('best').textContent = bestScore;
                document.getElementById('gameOverPanel').style.display = 'block';
            } else {
                setTimeout(() => {
                    ball = new Ball(80, 400);
                    charging = false;
                    power = 0;
                    updatePowerBar();
                }, 500);
            }
        }

        function updatePowerBar() {
            const fill = document.getElementById('powerFill');
            const arrow = document.getElementById('powerArrow');
            fill.style.height = power + '%';
            arrow.style.bottom = (20 + power * 1.5) + 'px';
        }

        function endCharge() {
            if (!charging || !gameActive) return;
            charging = false;

            // 最佳力度区域 (75-90%)
            const isPerfect = power >= 75 && power <= 90;

            // 发射篮球 - 固定角度 -52 度，力度决定速度
            const angle = -52;  // 固定角度，更容易掌握

            ball.shoot(power, angle);

            // 完美投篮提示
            if (isPerfect) {
                showMessage('完美!', '#2ecc71');
            }

            power = 0;
            updatePowerBar();
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 更新篮筐
            if (hoop) {
                hoop.update();
                hoop.draw();
            }

            // 绘制地板
            ctx.fillStyle = '#d4a574';
            ctx.fillRect(0, 450, canvas.width, 50);

            // 地板线条
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, 470);
            ctx.lineTo(400, 470);
            ctx.stroke();

            // 绘制目标指示线（蓄力时）
            if (charging && ball && !ball.inAir) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(ball.x, ball.y);
                // 显示投篮方向
                const angle = -52 * Math.PI / 180;
                const indicatorLength = 80 + power * 0.8;
                ctx.lineTo(
                    ball.x + Math.cos(angle) * indicatorLength,
                    ball.y + Math.sin(angle) * indicatorLength
                );
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // 更新和绘制粒子
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // 更新和绘制篮球
            if (ball) {
                ball.update();
                ball.draw();
            }

            // 蓄力
            if (charging && power < 100) {
                power += 2.5 * powerDirection;
                if (power >= 100) {
                    power = 100;
                    powerDirection = -1;
                } else if (power <= 0) {
                    power = 0;
                    powerDirection = 1;
                }
                updatePowerBar();
            }

            requestAnimationFrame(gameLoop);
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !charging && ball && !ball.inAir && gameActive) {
                e.preventDefault();
                charging = true;
                power = 0;
                powerDirection = 1;
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'Space' && charging) {
                e.preventDefault();
                endCharge();
            }
        });

        // 触摸/鼠标控制
        canvas.addEventListener('mousedown', (e) => {
            if (!gameActive || !ball || ball.inAir) return;
            charging = true;
            power = 0;
            powerDirection = 1;
        });
        canvas.addEventListener('mouseup', () => {
            if (charging) endCharge();
        });
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!gameActive || !ball || ball.inAir) return;
            charging = true;
            power = 0;
            powerDirection = 1;
        });
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (charging) endCharge();
        });

        // 开始游戏
        initGame();
    </script>
</body>
</html>
