<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫雷</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }

        /* iframe 嵌入时的样式 */
        body.iframe-mode {
            padding: 0;
            background: transparent;
        }

        body.iframe-mode .game-container {
            box-shadow: none;
            border: none;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 36px;
            background: linear-gradient(135deg, #4ade80, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        /* 顶部信息栏 */
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 700;
        }

        .info-icon {
            font-size: 24px;
        }

        .mine-count {
            color: #ef4444;
        }

        .timer {
            color: #fbbf24;
        }

        .face-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .face-btn:hover {
            transform: scale(1.1);
        }

        .face-btn:active {
            transform: scale(0.95);
        }

        /* 难度选择 */
        .difficulty-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .difficulty-btn {
            padding: 10px 20px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .difficulty-btn.active {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            border-color: #4ade80;
        }

        .difficulty-btn:hover {
            border-color: #4ade80;
        }

        /* 游戏面板 */
        .game-board {
            display: inline-block;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
            border: 3px solid rgba(74, 222, 128, 0.3);
        }

        .grid {
            display: grid;
            gap: 2px;
            background: rgba(0,0,0,0.5);
            padding: 2px;
            border-radius: 5px;
        }

        .cell {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.1s;
            border-radius: 4px;
            user-select: none;
        }

        /* 未揭开 */
        .cell.hidden {
            background: linear-gradient(135deg, #4b5563, #374151);
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.1),
                        inset -2px -2px 5px rgba(0,0,0,0.3);
        }

        .cell.hidden:hover {
            background: linear-gradient(135deg, #6b7280, #4b5563);
        }

        /* 已揭开 */
        .cell.revealed {
            background: rgba(255,255,255,0.1);
        }

        /* 地雷 */
        .cell.mine {
            background: #ef4444;
        }

        .cell.mine-flag {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
        }

        /* 数字颜色 */
        .cell[data-num="1"] { color: #3b82f6; }
        .cell[data-num="2"] { color: #22c55e; }
        .cell[data-num="3"] { color: #ef4444; }
        .cell[data-num="4"] { color: #8b5cf6; }
        .cell[data-num="5"] { color: #f59e0b; }
        .cell[data-num="6"] { color: #06b5cc; }
        .cell[data-num="7"] { color: #1a1a2e; }
        .cell[data-num="8"] { color: #6b7280; }

        /* 旗帜 */
        .cell.flagged {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
        }

        /* 标记 */
        .cell.question {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
        }

        /* 游戏结束弹窗 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .overlay.active {
            display: flex;
        }

        .modal {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            border: 2px solid rgba(74, 222, 128, 0.3);
            animation: modalIn 0.3s ease-out;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-icon {
            font-size: 80px;
            margin-bottom: 15px;
        }

        .modal-title {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .modal-title.win {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-title.lose {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-stats {
            margin: 20px 0;
            color: #888;
        }

        .modal-stat {
            font-size: 18px;
            margin: 5px 0;
        }

        .modal-stat span {
            color: #fbbf24;
            font-weight: 700;
        }

        .btn-restart {
            padding: 15px 40px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: white;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .btn-restart:hover {
            transform: scale(1.05);
        }

        /* 操作说明 */
        .instructions {
            margin-top: 20px;
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            font-size: 13px;
            color: #888;
        }

        .instructions h3 {
            font-size: 14px;
            color: #4ade80;
            margin-bottom: 10px;
        }

        .instruction-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .key {
            background: rgba(255,255,255,0.1);
            padding: 3px 8px;
            border-radius: 5px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <h1>💣 扫雷</h1>

    <div class="game-container">
        <!-- 难度选择 -->
        <div class="difficulty-selector">
            <button class="difficulty-btn" onclick="setDifficulty('easy')">初级</button>
            <button class="difficulty-btn active" onclick="setDifficulty('medium')">中级</button>
            <button class="difficulty-btn" onclick="setDifficulty('hard')">高级</button>
        </div>

        <!-- 信息栏 -->
        <div class="info-bar">
            <div class="info-item">
                <span class="info-icon">💣</span>
                <span class="mine-count" id="mineCount">0</span>
            </div>

            <button class="face-btn" id="faceBtn" onclick="initGame()">😊</button>

            <div class="info-item">
                <span class="info-icon">⏱️</span>
                <span class="timer" id="timer">000</span>
            </div>
        </div>

        <!-- 游戏面板 -->
        <div class="game-board">
            <div class="grid" id="grid"></div>
        </div>

        <!-- 操作说明 -->
        <div class="instructions">
            <h3>🎮 操作说明</h3>
            <div class="instruction-row">
                <span>左键点击</span>
                <span>揭开格子</span>
            </div>
            <div class="instruction-row">
                <span>右键点击</span>
                <span>插旗/取消</span>
            </div>
            <div class="instruction-row">
                <span>左右键同时</span>
                <span>快速揭开（双击已揭示数字）</span>
            </div>
        </div>
    </div>

    <!-- 游戏结束弹窗 -->
    <div class="overlay" id="overlay">
        <div class="modal">
            <div class="modal-icon" id="modalIcon">🎉</div>
            <div class="modal-title win" id="modalTitle">恭喜获胜!</div>
            <div class="modal-stats">
                <div class="modal-stat">用时：<span id="finalTime">0</span>秒</div>
                <div class="modal-stat">难度：<span id="finalDifficulty">中级</span></div>
            </div>
            <button class="btn-restart" onclick="closeModal()">再玩一局</button>
        </div>
    </div>

    <script>
        // 检测是否在 iframe 中运行
        if (window.self !== window.top) {
            document.body.classList.add('iframe-mode');
        }

        // 难度配置
        const DIFFICULTIES = {
            easy: { rows: 9, cols: 9, mines: 10 },
            medium: { rows: 16, cols: 16, mines: 40 },
            hard: { rows: 16, cols: 30, mines: 99 }
        };

        let currentDifficulty = 'medium';
        let board = [];
        let revealed = [];
        let flagged = [];
        let mines = [];
        let gameOver = false;
        let gameStarted = false;
        let mineCount = 0;
        let timer = 0;
        let timerInterval = null;

        // 初始化游戏
        function initGame() {
            const config = DIFFICULTIES[currentDifficulty];
            board = [];
            revealed = [];
            flagged = [];
            mines = [];
            gameOver = false;
            gameStarted = false;
            mineCount = config.mines;
            timer = 0;

            clearInterval(timerInterval);
            timerInterval = null;

            document.getElementById('faceBtn').textContent = '😊';
            document.getElementById('mineCount').textContent = mineCount;
            document.getElementById('timer').textContent = '000';
            document.getElementById('overlay').classList.remove('active');

            // 初始化空面板
            for (let r = 0; r < config.rows; r++) {
                board[r] = [];
                revealed[r] = [];
                flagged[r] = [];
                for (let c = 0; c < config.cols; c++) {
                    board[r][c] = 0;
                    revealed[r][c] = false;
                    flagged[r][c] = false;
                }
            }

            renderBoard();
        }

        // 放置地雷（确保第一个点击不会是雷）
        function placeMines(excludeRow, excludeCol) {
            const config = DIFFICULTIES[currentDifficulty];
            let placed = 0;

            while (placed < config.mines) {
                const r = Math.floor(Math.random() * config.rows);
                const c = Math.floor(Math.random() * config.cols);

                // 排除第一个点击位置及其周围
                const dist = Math.abs(r - excludeRow) + Math.abs(c - excludeCol);
                if (mines.some(m => m[0] === r && m[1] === c) || dist <= 1) {
                    continue;
                }

                mines.push([r, c]);
                board[r][c] = -1;
                placed++;
            }

            // 计算数字
            for (let r = 0; r < config.rows; r++) {
                for (let c = 0; c < config.cols; c++) {
                    if (board[r][c] !== -1) {
                        board[r][c] = countAdjacentMines(r, c);
                    }
                }
            }
        }

        // 计算周围地雷数
        function countAdjacentMines(row, col) {
            const config = DIFFICULTIES[currentDifficulty];
            let count = 0;

            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr === 0 && dc === 0) continue;
                    const nr = row + dr;
                    const nc = col + dc;
                    if (nr >= 0 && nr < config.rows && nc >= 0 && nc < config.cols) {
                        if (board[nr][nc] === -1) count++;
                    }
                }
            }

            return count;
        }

        // 渲染面板
        function renderBoard() {
            const config = DIFFICULTIES[currentDifficulty];
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${config.cols}, 35px)`;

            for (let r = 0; r < config.rows; r++) {
                for (let c = 0; c < config.cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell hidden';
                    cell.dataset.row = r;
                    cell.dataset.col = c;

                    cell.addEventListener('click', () => handleClick(r, c));
                    cell.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        handleRightClick(r, c);
                    });
                    cell.addEventListener('dblclick', () => handleDoubleClick(r, c));

                    grid.appendChild(cell);
                }
            }
        }

        // 更新单个格子显示
        function updateCell(row, col) {
            const config = DIFFICULTIES[currentDifficulty];
            const index = row * config.cols + col;
            const cell = document.getElementById('grid').children[index];

            cell.className = 'cell';

            if (flagged[row][col]) {
                cell.classList.add('flagged');
                cell.textContent = '🚩';
            } else if (revealed[row][col]) {
                cell.classList.add('revealed');
                if (board[row][col] === -1) {
                    cell.classList.add('mine');
                    cell.textContent = '💣';
                } else if (board[row][col] > 0) {
                    cell.textContent = board[row][col];
                    cell.dataset.num = board[row][col];
                } else {
                    cell.textContent = '';
                }
            } else {
                cell.classList.add('hidden');
                cell.textContent = '';
            }
        }

        // 开始计时
        function startTimer() {
            if (gameStarted) return;
            gameStarted = true;
            timerInterval = setInterval(() => {
                timer++;
                document.getElementById('timer').textContent = timer.toString().padStart(3, '0');
            }, 1000);
        }

        // 左键点击
        function handleClick(row, col) {
            if (gameOver || flagged[row][col]) return;

            // 第一次点击，放置地雷
            if (!gameStarted) {
                placeMines(row, col);
                startTimer();
            }

            // 点到雷
            if (board[row][col] === -1) {
                revealAllMines();
                endGame(false);
                return;
            }

            // 揭开格子
            revealCell(row, col);
            checkWin();
        }

        // 右键点击
        function handleRightClick(row, col) {
            if (gameOver || revealed[row][col]) return;

            flagged[row][col] = !flagged[row][col];
            mineCount += flagged[row][col] ? -1 : 1;
            document.getElementById('mineCount').textContent = mineCount;
            updateCell(row, col);
        }

        // 双击（快速揭开）
        function handleDoubleClick(row, col) {
            if (gameOver || !revealed[row][col] || board[row][col] <= 0) return;

            const config = DIFFICULTIES[currentDifficulty];
            let flagCount = 0;

            // 数周围旗帜
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr === 0 && dc === 0) continue;
                    const nr = row + dr;
                    const nc = col + dc;
                    if (nr >= 0 && nr < config.rows && nc >= 0 && nc < config.cols) {
                        if (flagged[nr][nc]) flagCount++;
                    }
                }
            }

            // 旗帜数量等于数字，揭开周围未标记的
            if (flagCount === board[row][col]) {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (dr === 0 && dc === 0) continue;
                        const nr = row + dr;
                        const nc = col + dc;
                        if (nr >= 0 && nr < config.rows && nc >= 0 && nc < config.cols) {
                            if (!revealed[nr][nc] && !flagged[nr][nc]) {
                                handleClick(nr, nc);
                            }
                        }
                    }
                }
            }
        }

        // 揭开格子（递归）
        function revealCell(row, col) {
            const config = DIFFICULTIES[currentDifficulty];
            if (row < 0 || row >= config.rows || col < 0 || col >= config.cols) return;
            if (revealed[row][col] || flagged[row][col]) return;

            revealed[row][col] = true;
            updateCell(row, col);

            // 如果是空格子，递归揭开周围
            if (board[row][col] === 0) {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (dr === 0 && dc === 0) continue;
                        revealCell(row + dr, col + dc);
                    }
                }
            }
        }

        // 显示所有地雷
        function revealAllMines() {
            const config = DIFFICULTIES[currentDifficulty];
            for (let r = 0; r < config.rows; r++) {
                for (let c = 0; c < config.cols; c++) {
                    if (board[r][c] === -1) {
                        revealed[r][c] = true;
                        updateCell(r, c);
                    }
                }
            }
        }

        // 检查胜利
        function checkWin() {
            const config = DIFFICULTIES[currentDifficulty];
            let unrevealed = 0;

            for (let r = 0; r < config.rows; r++) {
                for (let c = 0; c < config.cols; c++) {
                    if (!revealed[r][c] && board[r][c] !== -1) {
                        unrevealed++;
                    }
                }
            }

            if (unrevealed === 0) {
                endGame(true);
            }
        }

        // 游戏结束
        function endGame(win) {
            gameOver = true;
            clearInterval(timerInterval);

            document.getElementById('faceBtn').textContent = win ? '😎' : '😵';

            if (win) {
                document.getElementById('modalIcon').textContent = '🏆';
                document.getElementById('modalTitle').textContent = '恭喜获胜!';
                document.getElementById('modalTitle').className = 'modal-title win';
            } else {
                document.getElementById('modalIcon').textContent = '💥';
                document.getElementById('modalTitle').textContent = '游戏结束';
                document.getElementById('modalTitle').className = 'modal-title lose';
            }

            document.getElementById('finalTime').textContent = timer;

            const difficultyNames = { easy: '初级', medium: '中级', hard: '高级' };
            document.getElementById('finalDifficulty').textContent = difficultyNames[currentDifficulty];

            setTimeout(() => {
                document.getElementById('overlay').classList.add('active');
            }, 500);
        }

        function closeModal() {
            document.getElementById('overlay').classList.remove('active');
            initGame();
        }

        // 设置难度
        function setDifficulty(diff) {
            currentDifficulty = diff;
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent ===
                    (diff === 'easy' ? '初级' : diff === 'medium' ? '中级' : '高级'));
            });
            initGame();
        }

        // 初始化
        initGame();
    </script>
</body>
</html>
