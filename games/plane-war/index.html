<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞机大战 - 糖果乐园</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: sans-serif;
        }
        body.iframe-mode { padding: 0; }
        body.iframe-mode h1, body.iframe-mode .instructions { display: none; }
        h1 { color: #fff; margin-bottom: 10px; text-shadow: 0 0 10px #0ff; }
        .game-container {
            position: relative;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
            border: 2px solid #0ff;
        }
        canvas { display: block; }
        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            color: #0ff;
            font-size: 18px;
            z-index: 10;
        }
        .health-bar {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 150px;
            height: 10px;
            background: rgba(255,0,0,0.3);
            border-radius: 5px;
            overflow: hidden;
            z-index: 10;
        }
        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #f00, #ff0, #0f0);
            transition: width 0.3s;
        }
        .start-screen, .game-over-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #0ff;
        }
        .start-screen h2, .game-over-screen h2 {
            font-size: 28px;
            color: #0ff;
            margin-bottom: 15px;
            text-shadow: 0 0 10px #0ff;
        }
        .start-screen p { color: #aaa; font-size: 14px; margin-bottom: 20px; line-height: 1.6; }
        .btn {
            padding: 12px 30px;
            font-size: 18px;
            background: linear-gradient(135deg, #0ff, #00f);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
        .btn:hover { box-shadow: 0 0 30px rgba(0, 255, 255, 0.8); }
        .game-over-screen { display: none; }
        .game-over-screen .score-info {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            color: #fff;
        }
        .game-over-screen .score-info p { font-size: 18px; margin: 10px 0; }
        .game-over-screen .best { color: #ff0; }
    </style>
</head>
<body>
    <h1>✈️ 飞机大战</h1>
    <div class="game-container">
        <canvas id="game" width="450" height="650"></canvas>
        <div class="hud">
            <span>得分：<strong id="score">0</strong></span>
            <span>关卡：<strong id="level">1</strong></span>
        </div>
        <div class="health-bar"><div class="health-fill" id="healthFill"></div></div>
        <div class="start-screen" id="startScreen">
            <h2>🚀 飞机大战</h2>
            <p>鼠标/触摸控制飞机移动<br>自动发射子弹，击落敌机<br>收集道具，升级武器!</p>
            <button class="btn" onclick="startGame()">开始游戏</button>
        </div>
        <div class="game-over-screen" id="gameOverScreen">
            <h2>游戏结束!</h2>
            <div class="score-info">
                <p>得分：<strong id="finalScore">0</strong></p>
                <p class="best">最高：<strong id="bestScore">0</strong></p>
            </div>
            <button class="btn" onclick="startGame()">再来一局</button>
        </div>
    </div>
    <p class="instructions">鼠标/触摸控制移动 | 自动射击 | 击落敌机!</p>

    <script>
        if (window.self !== window.top) {
            document.body.classList.add('iframe-mode');
        }

        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        let gameState = 'start';
        let score = 0;
        let bestScore = localStorage.getItem('planeBest') || 0;
        let level = 1;
        let health = 100;
        let player = {};
        let bullets = [];
        let enemies = [];
        let particles = [];
        let powerups = [];
        let enemyTimer = 0;
        let shootTimer = 0;
        let weaponLevel = 1;

        function initPlayer() {
            player = {
                x: canvas.width / 2,
                y: canvas.height - 100,
                width: 50,
                height: 50,
                speed: 8
            };
        }

        function createEnemy() {
            const types = [
                { width: 40, height: 40, hp: 1, score: 10, speed: 3, color: '#f00', emoji: '🛩️' },
                { width: 50, height: 50, hp: 3, score: 20, speed: 2, color: '#f90', emoji: '🚁' },
                { width: 70, height: 70, hp: 5, score: 50, speed: 1.5, color: '#90f', emoji: '🛸' }
            ];
            const type = types[Math.min(types.length - 1, Math.floor(Math.random() * (1 + level / 3)))];

            enemies.push({
                x: Math.random() * (canvas.width - 60) + 30,
                y: -50,
                ...type,
                maxHp: type.hp
            });
        }

        function createBullet(x, y, vx, vy) {
            bullets.push({ x, y, vx, vy, width: 8, height: 20, color: '#0ff' });
        }

        function createExplosion(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1,
                    color,
                    size: Math.random() * 5 + 2
                });
            }
        }

        function createPowerup(x, y) {
            if (Math.random() < 0.15) {
                const types = ['weapon', 'health', 'bomb'];
                const type = types[Math.floor(Math.random() * types.length)];
                powerups.push({
                    x, y,
                    width: 30,
                    height: 30,
                    type,
                    emoji: type === 'weapon' ? '💪' : type === 'health' ? '❤️' : '💣'
                });
            }
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);

            // 飞机主体
            ctx.fillStyle = '#0ff';
            ctx.beginPath();
            ctx.moveTo(0, -25);
            ctx.lineTo(-20, 20);
            ctx.lineTo(0, 10);
            ctx.lineTo(20, 20);
            ctx.closePath();
            ctx.fill();

            // 引擎火焰
            ctx.fillStyle = '#f90';
            ctx.beginPath();
            ctx.moveTo(-10, 15);
            ctx.lineTo(0, 25 + Math.random() * 10);
            ctx.lineTo(10, 15);
            ctx.closePath();
            ctx.fill();

            //  emoji
            ctx.font = '30px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('✈️', 0, 0);

            ctx.restore();
        }

        function drawEnemies() {
            enemies.forEach(enemy => {
                ctx.save();
                ctx.translate(enemy.x, enemy.y);
                ctx.font = `${enemy.width}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(enemy.emoji, 0, 0);

                // 血条
                if (enemy.hp < enemy.maxHp) {
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(-20, -30, 40, 5);
                    ctx.fillStyle = '#0f0';
                    ctx.fillRect(-20, -30, 40 * (enemy.hp / enemy.maxHp), 5);
                }
                ctx.restore();
            });
        }

        function drawBullets() {
            ctx.fillStyle = '#0ff';
            bullets.forEach(bullet => {
                ctx.beginPath();
                ctx.roundRect(bullet.x - 3, bullet.y - 10, 6, 20, 3);
                ctx.fill();

                // 发光效果
                ctx.shadowColor = '#0ff';
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            });
        }

        function drawPowerups() {
            powerups.forEach(p => {
                ctx.font = '25px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(p.emoji, p.x, p.y);

                // 光晕
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 20, 0, Math.PI * 2);
                ctx.stroke();
            });
        }

        function drawBackground() {
            // 星空背景
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 移动星星
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 50; i++) {
                const x = (Date.now() / 20 + i * 37) % canvas.width;
                const y = (Date.now() / 10 + i * 73) % canvas.height;
                ctx.fillRect(x, y, 2, 2);
            }
        }

        function update() {
            if (gameState !== 'playing') return;

            // 玩家移动（跟随鼠标）
            // 已在鼠标事件中处理

            // 自动射击
            shootTimer++;
            if (shootTimer >= 10) {
                shootTimer = 0;
                if (weaponLevel >= 1) createBullet(player.x, player.y - 30, 0, -15);
                if (weaponLevel >= 2) {
                    createBullet(player.x - 15, player.y - 20, -2, -12);
                    createBullet(player.x + 15, player.y - 20, 2, -12);
                }
                if (weaponLevel >= 3) {
                    createBullet(player.x - 25, player.y, -4, -10);
                    createBullet(player.x + 25, player.y, 4, -10);
                }
            }

            // 子弹移动
            bullets.forEach((bullet, i) => {
                bullet.x += bullet.vx;
                bullet.y += bullet.vy;
                if (bullet.y < -20 || bullet.y > canvas.height + 20) {
                    bullets.splice(i, 1);
                }
            });

            // 敌机生成
            enemyTimer++;
            if (enemyTimer >= Math.max(30, 60 - level * 5)) {
                createEnemy();
                enemyTimer = 0;
            }

            // 敌机移动
            enemies.forEach((enemy, i) => {
                enemy.y += enemy.speed + level * 0.3;

                // 碰撞检测 - 子弹击中敌机
                bullets.forEach((bullet, bi) => {
                    if (Math.abs(bullet.x - enemy.x) < (enemy.width / 2 + 5) &&
                        Math.abs(bullet.y - enemy.y) < (enemy.height / 2 + 5)) {
                        enemy.hp--;
                        bullets.splice(bi, 1);
                        createExplosion(bullet.x, bullet.y, '#0ff', 3);

                        if (enemy.hp <= 0) {
                            score += enemy.score;
                            document.getElementById('score').textContent = score;
                            createExplosion(enemy.x, enemy.y, enemy.color);
                            createPowerup(enemy.x, enemy.y);
                            enemies.splice(i, 1);
                        }
                    }
                });

                // 敌机撞击玩家
                if (Math.abs(enemy.x - player.x) < (enemy.width / 2 + player.width / 3) &&
                    Math.abs(enemy.y - player.y) < (enemy.height / 2 + player.height / 3)) {
                    health -= 20;
                    enemies.splice(i, 1);
                    createExplosion(player.x, player.y, '#f00', 20);
                    updateHealth();
                    if (health <= 0) gameOver();
                }

                // 移除屏幕外的敌机
                if (enemy.y > canvas.height + 50) {
                    enemies.splice(i, 1);
                }
            });

            // 道具移动和收集
            powerups.forEach((p, i) => {
                p.y += 3;

                // 收集道具
                if (Math.abs(p.x - player.x) < 30 && Math.abs(p.y - player.y) < 30) {
                    if (p.type === 'weapon') {
                        weaponLevel = Math.min(3, weaponLevel + 1);
                    } else if (p.type === 'health') {
                        health = Math.min(100, health + 30);
                        updateHealth();
                    } else if (p.type === 'bomb') {
                        // 清屏
                        enemies.forEach(e => {
                            createExplosion(e.x, e.y, e.color);
                            score += e.score;
                        });
                        enemies = [];
                        document.getElementById('score').textContent = score;
                    }
                    powerups.splice(i, 1);
                }

                if (p.y > canvas.height + 30) {
                    powerups.splice(i, 1);
                }
            });

            // 粒子更新
            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.03;
                p.vy += 0.2;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            });

            // 升级
            const newLevel = Math.floor(score / 500) + 1;
            if (newLevel > level) {
                level = newLevel;
                document.getElementById('level').textContent = level;
                health = Math.min(100, health + 20);
                updateHealth();
            }
        }

        function updateHealth() {
            document.getElementById('healthFill').style.width = health + '%';
        }

        function draw() {
            drawBackground();
            drawPlayer();
            drawBullets();
            drawEnemies();
            drawPowerups();
            drawParticles();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            gameState = 'playing';
            score = 0;
            level = 1;
            health = 100;
            weaponLevel = 1;
            bullets = [];
            enemies = [];
            particles = [];
            powerups = [];
            initPlayer();
            updateHealth();
            document.getElementById('score').textContent = '0';
            document.getElementById('level').textContent = '1';
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
        }

        function gameOver() {
            gameState = 'gameover';
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('planeBest', bestScore);
            }
            document.getElementById('finalScore').textContent = score;
            document.getElementById('bestScore').textContent = Math.max(bestScore, localStorage.getItem('planeBest') || 0);
            document.getElementById('gameOverScreen').style.display = 'block';
        }

        // 控制
        canvas.addEventListener('mousemove', (e) => {
            if (gameState !== 'playing') return;
            const rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left;
            player.x = Math.max(30, Math.min(canvas.width - 30, player.x));
            player.y = e.clientY - rect.top;
            player.y = Math.max(30, Math.min(canvas.height - 30, player.y));
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (gameState !== 'playing') return;
            const rect = canvas.getBoundingClientRect();
            player.x = e.touches[0].clientX - rect.left;
            player.y = e.touches[0].clientY - rect.top;
        });

        // 初始化
        initPlayer();
        gameLoop();
    </script>
</body>
</html>
