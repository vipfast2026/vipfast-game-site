<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极速赛车</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
            padding: 10px;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 24px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .game-container {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.3);
            border: 3px solid rgba(251, 191, 36, 0.3);
        }

        #gameCanvas {
            display: block;
        }

        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 5;
        }

        .hud-item {
            background: rgba(0,0,0,0.7);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
        }

        .hud-item span {
            color: #fbbf24;
        }

        /* 游戏状态弹窗 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay-title {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .overlay-subtitle {
            font-size: 13px;
            color: #888;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-start {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #1a1a2e;
        }

        .btn-start:hover {
            transform: scale(1.05);
        }

        /* 音乐控制 */
        .music-control {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            padding: 8px 12px;
            border-radius: 15px;
            cursor: pointer;
            z-index: 100;
            font-size: 12px;
        }

        /* 移动端控制 */
        .mobile-controls {
            display: none;
            margin-top: 15px;
            gap: 10px;
        }

        .mobile-btn {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 15px;
            background: rgba(251, 191, 36, 0.3);
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .mobile-btn.gas { background: rgba(74, 222, 128, 0.5); }
        .mobile-btn.brake { background: rgba(239, 68, 68, 0.5); }

        @media (max-width: 600px) {
            .mobile-controls { display: flex; }
        }
    </style>
</head>
<body>
    <h1>🏎️ 极速赛车</h1>

    <div class="music-control" onclick="toggleMusic()">
        <span id="musicIcon">🔇</span> 音乐
    </div>

    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>

        <div class="hud">
            <div class="hud-item">🏁 <span id="lapDisplay">1/3</span></div>
            <div class="hud-item">⏱️ <span id="timeDisplay">00:00</span></div>
            <div class="hud-item">📍 <span id="posDisplay">1/6</span></div>
        </div>

        <!-- 开始界面 -->
        <div class="overlay" id="startOverlay">
            <div style="font-size: 60px; margin-bottom: 15px;">🏎️</div>
            <div class="overlay-title">极速赛车</div>
            <div class="overlay-subtitle">避开障碍，争取第一！</div>
            <button class="btn btn-start" onclick="startGame()">开始比赛</button>
        </div>

        <!-- 游戏结束 -->
        <div class="overlay hidden" id="gameOverOverlay">
            <div style="font-size: 60px; margin-bottom: 15px;" id="resultIcon">🏆</div>
            <div class="overlay-title" id="resultTitle">比赛结束</div>
            <p style="color: #888; margin: 10px 0;" id="resultDesc">第 1 名 / 6</p>
            <button class="btn btn-start" onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <!-- 移动端控制 -->
    <div class="mobile-controls">
        <button class="mobile-btn" onclick="setKey('ArrowLeft', true)">←</button>
        <button class="mobile-btn brake" onclick="setKey('ArrowDown', true)">🛑</button>
        <button class="mobile-btn gas" onclick="setKey('ArrowUp', true)">🚀</button>
        <button class="mobile-btn" onclick="setKey('ArrowRight', true)">→</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏配置
        const ROAD_X = 50;
        const ROAD_WIDTH = 300;
        const LANE_WIDTH = ROAD_WIDTH / 3;

        // 玩家状态
        let player = {
            x: canvas.width / 2,
            y: canvas.height - 100,
            width: 40,
            height: 70,
            speed: 0,
            maxSpeed: 8,
            lane: 1 // 0=左，1=中，2=右
        };

        // 游戏状态
        let obstacles = [];
        let coins = [];
        let score = 0;
        let lap = 1;
        let maxLaps = 3;
        let gameTime = 0;
        let isGameRunning = false;
        let roadOffset = 0;
        let position = 1;

        // 对手状态
        let opponents = [
            { x: ROAD_X + LANE_WIDTH * 0.5, y: -200, speed: 3, lane: 0 },
            { x: ROAD_X + LANE_WIDTH * 1.5, y: -400, speed: 3.5, lane: 1 },
            { x: ROAD_X + LANE_WIDTH * 2.5, y: -600, speed: 3.2, lane: 2 },
            { x: ROAD_X + LANE_WIDTH * 0.5, y: -800, speed: 3.8, lane: 0 },
            { x: ROAD_X + LANE_WIDTH * 2.5, y: -1000, speed: 3.3, lane: 2 }
        ];

        // 按键状态
        const keys = {
            ArrowLeft: false,
            ArrowRight: false,
            ArrowUp: false,
            ArrowDown: false
        };

        // 音乐状态
        let isMusicOn = false;
        let audioContext = null;

        // 初始化
        function init() {
            player.x = canvas.width / 2;
            player.y = canvas.height - 100;
            player.speed = 0;
            player.lane = 1;
            obstacles = [];
            coins = [];
            score = 0;
            lap = 1;
            gameTime = 0;
            position = 1;
            opponents = [
                { x: ROAD_X + LANE_WIDTH * 0.5, y: -200, speed: 3, lane: 0 },
                { x: ROAD_X + LANE_WIDTH * 1.5, y: -400, speed: 3.5, lane: 1 },
                { x: ROAD_X + LANE_WIDTH * 2.5, y: -600, speed: 3.2, lane: 2 },
                { x: ROAD_X + LANE_WIDTH * 0.5, y: -800, speed: 3.8, lane: 0 },
                { x: ROAD_X + LANE_WIDTH * 2.5, y: -1000, speed: 3.3, lane: 2 }
            ];
            updateHUD();
        }

        // 绘制道路
        function drawRoad() {
            // 草地
            ctx.fillStyle = '#1a4a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 道路
            ctx.fillStyle = '#3a3a3a';
            ctx.fillRect(ROAD_X, 0, ROAD_WIDTH, canvas.height);

            // 路肩
            ctx.fillStyle = '#fff';
            ctx.fillRect(ROAD_X - 10, 0, 10, canvas.height);
            ctx.fillRect(ROAD_X + ROAD_WIDTH, 0, 10, canvas.height);

            // 车道线
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.setLineDash([30, 30]);
            ctx.lineDashOffset = -roadOffset;

            for (let i = 1; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(ROAD_X + i * LANE_WIDTH, 0);
                ctx.lineTo(ROAD_X + i * LANE_WIDTH, canvas.height);
                ctx.stroke();
            }
            ctx.setLineDash([]);
        }

        // 绘制玩家赛车
        function drawPlayer() {
            drawCar(player.x, player.y, '#4ade80', true);
        }

        // 绘制对手赛车
        function drawOpponents() {
            const colors = ['#ef4444', '#3b82f6', '#8b5cf6', '#f59e0b', '#10b981'];
            opponents.forEach((opp, i) => {
                drawCar(opp.x, opp.y % canvas.height, colors[i], false);
            });
        }

        // 绘制赛车
        function drawCar(x, y, color, isPlayer) {
            ctx.save();
            ctx.translate(x, y);

            // 车身
            ctx.fillStyle = color;
            ctx.fillRect(-20, -35, 40, 70);

            // 车顶
            ctx.fillStyle = isPlayer ? '#22c55e' : darkenColor(color, -40);
            ctx.fillRect(-15, -20, 30, 40);

            // 车轮
            ctx.fillStyle = '#000';
            ctx.fillRect(-22, -25, 8, 15);
            ctx.fillRect(14, -25, 8, 15);
            ctx.fillRect(-22, 10, 8, 15);
            ctx.fillRect(14, 10, 8, 15);

            // 车灯
            ctx.fillStyle = isPlayer ? '#fff' : '#ff0';
            ctx.fillRect(-15, -35, 10, 5);
            ctx.fillRect(5, -35, 10, 5);

            ctx.restore();
        }

        function darkenColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.max(0, Math.min(255, (num >> 16) + amt));
            const G = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amt));
            const B = Math.max(0, Math.min(255, (num & 0x0000FF) + amt));
            return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
        }

        // 生成障碍物
        function spawnObstacle() {
            const lane = Math.floor(Math.random() * 3);
            obstacles.push({
                x: ROAD_X + lane * LANE_WIDTH + LANE_WIDTH / 2,
                y: -50,
                width: 50,
                height: 50,
                lane: lane
            });
        }

        // 绘制障碍物
        function drawObstacles() {
            obstacles.forEach(obs => {
                ctx.fillStyle = '#ef4444';
                ctx.beginPath();
                ctx.arc(obs.x, obs.y, 25, 0, Math.PI * 2);
                ctx.fill();

                // 警告标志
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('!', obs.x, obs.y);
            });
        }

        // 更新玩家位置
        function updatePlayer() {
            // 左右移动
            const targetLaneX = ROAD_X + player.lane * LANE_WIDTH + LANE_WIDTH / 2;
            player.x += (targetLaneX - player.x) * 0.15;

            // 加速/减速
            if (keys.ArrowUp) {
                player.speed = Math.min(player.maxSpeed, player.speed + 0.2);
            } else if (keys.ArrowDown) {
                player.speed = Math.max(0, player.speed - 0.3);
            } else {
                player.speed *= 0.98;
            }

            // 变换车道
            if (keys.ArrowLeft && player.lane > 0) {
                player.lane--;
                keys.ArrowLeft = false;
            }
            if (keys.ArrowRight && player.lane < 2) {
                player.lane++;
                keys.ArrowRight = false;
            }

            // 滚动道路
            roadOffset += 5 + player.speed * 3;
            if (roadOffset > 60) roadOffset = 0;

            // 更新游戏时间
            gameTime += 1/60;

            // 检查圈数（每 30 秒一圈）
            if (gameTime > lap * 30 && lap < maxLaps) {
                lap++;
                updateHUD();
            }
        }

        // 更新对手
        function updateOpponents() {
            opponents.forEach(opp => {
                opp.y += opp.speed + player.speed * 0.3;
                if (opp.y > canvas.height + 100) {
                    opp.y = -100;
                }
            });
        }

        // 更新障碍物
        function updateObstacles() {
            // 生成新障碍物
            if (Math.random() < 0.03) {
                spawnObstacle();
            }

            // 移动障碍物
            obstacles.forEach(obs => {
                obs.y += 5 + player.speed * 2;
            });

            // 移除超出屏幕的障碍物
            obstacles = obstacles.filter(obs => obs.y < canvas.height + 50);

            // 碰撞检测
            obstacles.forEach(obs => {
                const dx = player.x - obs.x;
                const dy = player.y - obs.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 50) {
                    player.speed *= 0.3;
                    obs.y = canvas.height + 100; // 移除障碍物
                }
            });
        }

        // 更新排名
        function updatePosition() {
            let pos = 1;
            opponents.forEach(opp => {
                if (opp.y > player.y - 50) pos++;
            });
            position = pos;
            updateHUD();
        }

        // 更新 HUD
        function updateHUD() {
            document.getElementById('lapDisplay').textContent = `${lap}/${maxLaps}`;
            document.getElementById('timeDisplay').textContent = formatTime(gameTime);
            document.getElementById('posDisplay').textContent = `${position}/6`;
        }

        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        // 游戏主循环
        function gameLoop() {
            if (!isGameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawRoad();
            updatePlayer();
            updateOpponents();
            updateObstacles();
            drawObstacles();
            drawOpponents();
            drawPlayer();
            updatePosition();

            // 检查是否完成比赛
            if (lap >= maxLaps && position === 1) {
                endGame(true);
                return;
            }

            if (lap >= maxLaps) {
                endGame(false);
                return;
            }

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            document.getElementById('startOverlay').classList.add('hidden');
            init();
            isGameRunning = true;
            if (isMusicOn) {
                initAudio();
                playBGM();
            }
            gameLoop();
        }

        function restartGame() {
            document.getElementById('gameOverOverlay').classList.add('hidden');
            startGame();
        }

        function endGame(win) {
            isGameRunning = false;
            document.getElementById('resultIcon').textContent = win ? '🏆' : '💪';
            document.getElementById('resultTitle').textContent = win ? '恭喜夺冠!' : '比赛结束';
            document.getElementById('resultDesc').textContent = `第 ${position}名 / 6`;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        // 音频系统
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playBGM() {
            if (!audioContext || !isMusicOn) return;

            const now = audioContext.currentTime;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();

            osc.connect(gain);
            gain.connect(audioContext.destination);

            osc.frequency.setValueAtTime(200, now);
            osc.type = 'square';
            gain.gain.setValueAtTime(0.1, now);

            // 简单节奏
            for (let i = 0; i < 8; i++) {
                gain.gain.setValueAtTime(0.1, now + i * 0.25);
                gain.gain.setValueAtTime(0.01, now + i * 0.25 + 0.1);
            }

            osc.start(now);
            osc.stop(now + 2);

            setTimeout(() => {
                if (isMusicOn && isGameRunning) playBGM();
            }, 2000);
        }

        function toggleMusic() {
            isMusicOn = !isMusicOn;
            document.getElementById('musicIcon').textContent = isMusicOn ? '🔊' : '🔇';
            if (isMusicOn && isGameRunning) {
                initAudio();
                playBGM();
            }
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) {
                keys[e.key] = true;
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) {
                keys[e.key] = false;
            }
        });

        // 移动端控制
        function setKey(key, value) {
            keys[key] = value;
        }

        // 初始化
        init();
        drawRoad();
        drawPlayer();
    </script>
</body>
</html>
