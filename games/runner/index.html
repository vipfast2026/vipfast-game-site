<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地铁跑酷</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        #gameCanvas {
            display: block;
            background: linear-gradient(180deg, #2d1b4e 0%, #1a1a2e 100%);
        }

        .game-header {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
        }

        .score-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 15px;
            color: white;
        }

        .score-label {
            font-size: 12px;
            opacity: 0.8;
        }

        .score-value {
            font-size: 24px;
            font-weight: 900;
            color: #4ade80;
        }

        .coin-count {
            font-size: 24px;
            font-weight: 900;
            color: #fbbf24;
        }

        /* 游戏结束弹窗 */
        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        .game-over-overlay.active {
            display: flex;
        }

        .game-over-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .game-over-title {
            font-size: 32px;
            font-weight: 900;
            color: white;
            margin-bottom: 10px;
        }

        .game-over-score {
            font-size: 48px;
            font-weight: 900;
            color: #4ade80;
            margin-bottom: 10px;
        }

        .game-over-coins {
            font-size: 24px;
            color: #fbbf24;
            margin-bottom: 25px;
        }

        .btn-restart {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            border: none;
            color: white;
            padding: 15px 50px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .btn-restart:hover {
            transform: scale(1.05);
        }

        /* 开始界面 */
        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
        }

        .start-screen h1 {
            font-size: 48px;
            color: white;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(74, 222, 128, 0.5);
        }

        .start-screen p {
            color: #a0a0a0;
            margin-bottom: 30px;
        }

        .start-screen .controls-hint {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .key-hint {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
        }

        .btn-start {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            border: none;
            color: white;
            padding: 18px 60px;
            font-size: 22px;
            font-weight: 900;
            border-radius: 35px;
            cursor: pointer;
            transition: transform 0.3s;
            animation: pulse 2s ease-in-out infinite;
        }

        .btn-start:hover {
            transform: scale(1.05);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* 移动端控制 */
        .mobile-controls {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            justify-content: center;
            gap: 15px;
            z-index: 15;
        }

        .mobile-btn {
            width: 70px;
            height: 70px;
            border: none;
            border-radius: 20px;
            background: rgba(74, 222, 128, 0.3);
            color: white;
            font-size: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mobile-btn:active {
            transform: scale(0.9);
            background: rgba(74, 222, 128, 0.5);
        }

        @media (max-width: 768px) {
            .mobile-controls {
                display: flex;
            }

            .controls-hint {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>

        <div class="game-header">
            <div class="score-box">
                <div class="score-label">得分</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">金币</div>
                <div class="coin-count" id="coins">0</div>
            </div>
        </div>

        <!-- 开始界面 -->
        <div class="start-screen" id="startScreen">
            <h1>🏃 地铁跑酷</h1>
            <p>躲避障碍，收集金币，跑得越远越好！</p>
            <div class="controls-hint">
                <div class="key-hint">← 左移</div>
                <div class="key-hint">↑ 跳跃</div>
                <div class="key-hint">↓ 翻滚</div>
                <div class="key-hint">→ 右移</div>
            </div>
            <button class="btn-start" onclick="startGame()">🎮 开始奔跑</button>
        </div>

        <!-- 游戏结束 -->
        <div class="game-over-overlay" id="gameOverOverlay">
            <div class="game-over-icon">💥</div>
            <div class="game-over-title">游戏结束</div>
            <div class="game-over-score" id="finalScore">0</div>
            <div class="game-over-coins" id="finalCoins">金币：0</div>
            <button class="btn-restart" onclick="restartGame()">再玩一次</button>
        </div>

        <!-- 移动端控制 -->
        <div class="mobile-controls">
            <button class="mobile-btn" onclick="moveLeft()">←</button>
            <button class="mobile-btn" onclick="jump()">↑</button>
            <button class="mobile-btn" onclick="roll()">↓</button>
            <button class="mobile-btn" onclick="moveRight()">→</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏配置
        const LANE_COUNT = 3;
        const LANE_WIDTH = canvas.width / LANE_COUNT;
        const GROUND_Y = 500;

        // 游戏状态
        let player = {
            lane: 1,
            y: GROUND_Y,
            vy: 0,
            width: 50,
            height: 70,
            isJumping: false,
            isRolling: false,
            rollTimer: 0,
            jumpTimer: 0
        };

        let obstacles = [];
        let coins = [];
        let particles = [];
        let score = 0;
        let coinCount = 0;
        let gameSpeed = 5;
        let isGameRunning = false;
        let isGameOver = false;
        let frameCount = 0;
        let highScore = localStorage.getItem('runnerHighScore') || 0;

        // 颜色配置
        const COLORS = {
            lane: ['#1a1a2e', '#16213e', '#1a1a2e'],
            player: '#4ade80',
            playerRoll: '#22c55e',
            obstacle: ['#ef4444', '#f97316', '#eab308'],
            coin: '#fbbf24'
        };

        // 玩家类
        class Player {
            constructor() {
                this.lane = 1;
                this.targetX = LANE_WIDTH * 1 + (LANE_WIDTH - 50) / 2;
                this.x = this.targetX;
                this.y = GROUND_Y - 70;
                this.vy = 0;
                this.width = 50;
                this.height = 70;
                this.isJumping = false;
                this.isRolling = false;
                this.rollTimer = 0;
                this.jumpTimer = 0;
            }

            update() {
                // 平滑移动到目标车道
                const targetX = this.lane * LANE_WIDTH + (LANE_WIDTH - this.width) / 2;
                this.x += (targetX - this.x) * 0.3;

                // 跳跃物理
                if (this.isJumping) {
                    this.y += this.vy;
                    this.vy += 0.8; // 重力
                    this.jumpTimer--;
                    if (this.y >= GROUND_Y - this.height) {
                        this.isJumping = false;
                        this.y = GROUND_Y - this.height;
                    }
                } else {
                    this.y = GROUND_Y - this.height;
                }

                // 翻滚
                if (this.isRolling) {
                    this.rollTimer--;
                    this.height = 35;
                    if (this.rollTimer <= 0) {
                        this.isRolling = false;
                        this.height = 70;
                    }
                }
            }

            draw() {
                ctx.save();

                // 身体
                ctx.fillStyle = this.isRolling ? COLORS.playerRoll : COLORS.player;

                if (this.isRolling) {
                    // 翻滚时画成圆形
                    ctx.beginPath();
                    ctx.arc(this.x + this.width/2, this.y + this.height, this.height, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // 正常状态画成人物
                    const x = this.x;
                    const y = this.y;

                    // 身体
                    ctx.fillRect(x + 10, y + 20, 30, 35);

                    // 头
                    ctx.fillStyle = '#ffdbac';
                    ctx.beginPath();
                    ctx.arc(x + 25, y + 12, 12, 0, Math.PI * 2);
                    ctx.fill();

                    // 腿（跑步动画）
                    ctx.fillStyle = COLORS.player;
                    const legOffset = Math.sin(frameCount * 0.3) * 10;
                    if (this.isJumping) {
                        // 跳跃时腿收起
                        ctx.fillRect(x + 12, y + 55, 10, 10);
                        ctx.fillRect(x + 28, y + 55, 10, 10);
                    } else {
                        // 跑步
                        ctx.fillRect(x + 12, y + 55, 10, 15 + legOffset);
                        ctx.fillRect(x + 28, y + 55, 10, 15 - legOffset);
                    }

                    // 手臂
                    ctx.fillRect(x + 5, y + 22, 8, 25 - legOffset);
                    ctx.fillRect(x + 37, y + 22, 8, 25 + legOffset);
                }

                ctx.restore();
            }

            jump() {
                if (!this.isJumping) {
                    this.isJumping = true;
                    this.vy = -15;
                    this.jumpTimer = 40;
                }
            }

            roll() {
                if (!this.isJumping && !this.isRolling) {
                    this.isRolling = true;
                    this.rollTimer = 30;
                } else if (this.isJumping) {
                    // 空中翻滚加速下落
                    this.vy += 5;
                }
            }

            moveLeft() {
                if (this.lane > 0) {
                    this.lane--;
                }
            }

            moveRight() {
                if (this.lane < LANE_COUNT - 1) {
                    this.lane++;
                }
            }
        }

        // 障碍物类
        class Obstacle {
            constructor(lane, type) {
                this.lane = lane;
                this.x = lane * LANE_WIDTH + (LANE_WIDTH - 50) / 2;
                this.y = -100;
                this.type = type; // 0=低障碍，1=高障碍，2=火车
                this.width = 50;
                this.height = type === 0 ? 30 : type === 1 ? 60 : 100;
                this.passed = false;
            }

            update() {
                this.y += gameSpeed;
            }

            draw() {
                const x = this.x;
                const y = this.y;

                if (this.type === 2) {
                    // 火车
                    ctx.fillStyle = '#dc2626';
                    ctx.fillRect(x, y, this.width, this.height);

                    // 车窗
                    ctx.fillStyle = '#60a5fa';
                    ctx.fillRect(x + 5, y + 10, this.width - 10, 20);

                    // 车灯
                    ctx.fillStyle = '#fbbf24';
                    ctx.beginPath();
                    ctx.arc(x + 15, y + this.height - 10, 5, 0, Math.PI * 2);
                    ctx.arc(x + this.width - 15, y + this.height - 10, 5, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.type === 1) {
                    // 高障碍（需要翻滚）
                    ctx.fillStyle = '#f97316';
                    ctx.fillRect(x, y, this.width, this.height);

                    // 警告条纹
                    ctx.fillStyle = '#fef3c7';
                    for (let i = 0; i < 5; i++) {
                        ctx.fillRect(x, y + i * 15, this.width, 5);
                    }
                } else {
                    // 低障碍（需要跳跃）
                    ctx.fillStyle = '#ef4444';
                    ctx.fillRect(x, y, this.width, this.height);

                    // 尖刺
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(x + 15, y - 15);
                    ctx.lineTo(x + 30, y);
                    ctx.lineTo(x + 45, y - 15);
                    ctx.lineTo(x + 50, y);
                    ctx.fill();
                }
            }

            getBounds() {
                return {
                    x: this.x,
                    y: this.y,
                    width: this.width,
                    height: this.height
                };
            }
        }

        // 金币类
        class Coin {
            constructor(lane) {
                this.lane = lane;
                this.x = lane * LANE_WIDTH + LANE_WIDTH / 2;
                this.y = -50;
                this.radius = 15;
                this.rotation = 0;
                this.collected = false;
            }

            update() {
                this.y += gameSpeed;
                this.rotation += 0.1;
            }

            draw() {
                if (this.collected) return;

                ctx.save();
                ctx.translate(this.x, this.y);

                // 3D 旋转效果
                const scaleX = Math.abs(Math.cos(this.rotation));
                ctx.scale(scaleX, 1);

                // 金币
                ctx.fillStyle = COLORS.coin;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // 内圈
                ctx.strokeStyle = '#f59e0b';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius - 4, 0, Math.PI * 2);
                ctx.stroke();

                // 文字
                ctx.fillStyle = '#f59e0b';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('$', 0, 1);

                // 闪光
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.beginPath();
                ctx.arc(-5, -5, 4, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        // 粒子效果
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1;
                this.color = color;
                this.size = Math.random() * 8 + 4;
            }

            update() {
                this.vy += 0.3;
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.03;
            }

            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.globalAlpha = 1;
            }
        }

        function createCoinEffect(x, y) {
            for (let i = 0; i < 10; i++) {
                particles.push(new Particle(x, y, COLORS.coin));
            }
        }

        function createCrashEffect(x, y) {
            for (let i = 0; i < 30; i++) {
                particles.push(new Particle(x, y, '#ef4444'));
            }
        }

        // 游戏实例
        let playerInstance;

        function init() {
            playerInstance = new Player();
            obstacles = [];
            coins = [];
            particles = [];
            score = 0;
            coinCount = 0;
            gameSpeed = 5;
            frameCount = 0;
            isGameOver = false;
            updateUI();
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            init();
            isGameRunning = true;
            gameLoop();
        }

        function restartGame() {
            document.getElementById('gameOverOverlay').classList.remove('active');
            document.getElementById('startScreen').style.display = 'flex';
        }

        function gameOver() {
            isGameRunning = false;
            isGameOver = true;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('runnerHighScore', highScore);
            }

            document.getElementById('finalScore').textContent = Math.floor(score);
            document.getElementById('finalCoins').textContent = '金币：' + coinCount;
            document.getElementById('gameOverOverlay').classList.add('active');
        }

        function spawnObstacle() {
            const lane = Math.floor(Math.random() * LANE_COUNT);
            const type = Math.floor(Math.random() * 3);
            obstacles.push(new Obstacle(lane, type));
        }

        function spawnCoin() {
            const lane = Math.floor(Math.random() * LANE_COUNT);
            coins.push(new Coin(lane));
        }

        function checkCollisions() {
            const playerBounds = {
                x: playerInstance.x + 10,
                y: playerInstance.y,
                width: playerInstance.width - 20,
                height: playerInstance.height
            };

            // 障碍物碰撞
            for (const obs of obstacles) {
                const obsBounds = obs.getBounds();

                if (playerBounds.x < obsBounds.x + obsBounds.width &&
                    playerBounds.x + playerBounds.width > obsBounds.x &&
                    playerBounds.y < obsBounds.y + obsBounds.height &&
                    playerBounds.y + playerBounds.height > obsBounds.y) {
                    gameOver();
                    createCrashEffect(playerInstance.x + playerInstance.width/2, playerInstance.y + playerInstance.height/2);
                    return;
                }
            }

            // 金币收集
            for (const coin of coins) {
                if (coin.collected) continue;

                const dx = (playerInstance.lane * LANE_WIDTH + LANE_WIDTH/2) - coin.x;
                const dy = (playerInstance.y + playerInstance.height/2) - coin.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 50) {
                    coin.collected = true;
                    coinCount++;
                    score += 50;
                    createCoinEffect(coin.x, coin.y);
                }
            }
        }

        function updateUI() {
            document.getElementById('score').textContent = Math.floor(score);
            document.getElementById('coins').textContent = coinCount;
        }

        function drawBackground() {
            // 天空
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#2d1b4e');
            gradient.addColorStop(1, '#1a1a2e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 车道线
            for (let i = 1; i < LANE_COUNT; i++) {
                const x = i * LANE_WIDTH;
                ctx.strokeStyle = 'rgba(74, 222, 128, 0.3)';
                ctx.lineWidth = 3;
                ctx.setLineDash([30, 20]);
                ctx.lineDashOffset = -frameCount * gameSpeed;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            ctx.setLineDash([]);

            // 地面
            ctx.fillStyle = '#0f0f1a';
            ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
        }

        function gameLoop() {
            if (!isGameRunning) return;

            frameCount++;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBackground();

            // 生成障碍物
            if (frameCount % 90 === 0) {
                spawnObstacle();
            }

            // 生成金币
            if (frameCount % 40 === 0) {
                spawnCoin();
            }

            // 增加难度
            if (frameCount % 600 === 0) {
                gameSpeed += 0.5;
            }

            // 更新和绘制障碍物
            obstacles = obstacles.filter(obs => obs.y < canvas.height + 100);
            for (const obs of obstacles) {
                obs.update();
                obs.draw();

                // 得分
                if (!obs.passed && obs.y > GROUND_Y) {
                    obs.passed = true;
                    score += 10;
                }
            }

            // 更新和绘制金币
            coins = coins.filter(coin => coin.y < canvas.height + 50 && !coin.collected);
            for (const coin of coins) {
                coin.update();
                coin.draw();
            }

            // 更新和绘制粒子
            particles = particles.filter(p => p.life > 0);
            for (const p of particles) {
                p.update();
                p.draw();
            }

            // 更新玩家
            playerInstance.update();
            playerInstance.draw();

            // 碰撞检测
            checkCollisions();

            // 持续得分
            score += 0.1;
            updateUI();

            requestAnimationFrame(gameLoop);
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;

            switch(e.key) {
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    playerInstance.moveLeft();
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    playerInstance.moveRight();
                    break;
                case 'ArrowUp':
                case 'w':
                case 'W':
                case ' ':
                    playerInstance.jump();
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    playerInstance.roll();
                    break;
            }
        });

        // 移动端控制函数
        function moveLeft() { playerInstance.moveLeft(); }
        function moveRight() { playerInstance.moveRight(); }
        function jump() { playerInstance.jump(); }
        function roll() { playerInstance.roll(); }

        // 初始绘制
        drawBackground();
    </script>
</body>
</html>
