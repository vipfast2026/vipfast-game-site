<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>羊了个羊 - 糖果乐园</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        body {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: sans-serif;
            user-select: none;
            touch-action: none;
        }
        body.iframe-mode { padding: 0; }
        body.iframe-mode h1, body.iframe-mode .instructions { display: none; }
        h1 { color: #667eea; margin-bottom: 10px; }
        .game-container {
            position: relative;
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .slot-area {
            display: flex;
            gap: 5px;
            justify-content: center;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 15px;
            margin-bottom: 20px;
            min-height: 70px;
        }
        .slot {
            width: 60px;
            height: 60px;
            border: 3px dashed #ccc;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            background: rgba(255,255,255,0.5);
        }
        .slot.filled {
            border-style: solid;
            border-color: #667eea;
            animation: slotFill 0.3s;
        }
        @keyframes slotFill {
            0% { transform: scale(0.8); }
            100% { transform: scale(1); }
        }
        .tile-area {
            display: grid;
            grid-template-columns: repeat(8, 55px);
            gap: 8px;
            justify-content: center;
            padding: 20px;
            min-height: 300px;
        }
        .tile {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
            border: 2px solid #ddd;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }
        .tile:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .tile.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(0.5);
        }
        .tile.matched {
            animation: matchPop 0.5s forwards;
        }
        @keyframes matchPop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }
        .start-screen, .game-over-screen, .win-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
            background: rgba(255,255,255,0.98);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .start-screen h2, .game-over-screen h2, .win-screen h2 {
            font-size: 24px;
            color: #667eea;
            margin-bottom: 15px;
        }
        .start-screen p, .game-over-screen p { color: #666; font-size: 14px; margin-bottom: 20px; }
        .btn {
            padding: 12px 30px;
            font-size: 18px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
        .btn:hover { opacity: 0.9; }
        .game-over-screen, .win-screen { display: none; }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #f0f0f0;
            border-radius: 5px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }
        .shuffle-btn {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 14px;
            background: #f39c12;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🐑 羊了个羊</h1>
    <div class="game-container">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="slot-area" id="slotArea">
            <div class="slot" data-index="0"></div>
            <div class="slot" data-index="1"></div>
            <div class="slot" data-index="2"></div>
            <div class="slot" data-index="3"></div>
            <div class="slot" data-index="4"></div>
            <div class="slot" data-index="5"></div>
            <div class="slot" data-index="6"></div>
        </div>
        <div class="tile-area" id="tileArea"></div>
        <button class="shuffle-btn" onclick="shuffleTiles()">🔀 洗牌</button>

        <div class="start-screen" id="startScreen">
            <h2>🐑 羊了个羊</h2>
            <p>点击方块放入卡槽<br>相同图案 3 个消除<br>卡槽满了就游戏结束!</p>
            <button class="btn" onclick="startGame()">开始游戏</button>
        </div>
        <div class="game-over-screen" id="gameOverScreen">
            <h2>😢 游戏结束!</h2>
            <p>卡槽已经满了...</p>
            <button class="btn" onclick="startGame()">再来一局</button>
        </div>
        <div class="win-screen" id="winScreen">
            <h2>🎉 恭喜通关!</h2>
            <p>你太厉害了!</p>
            <button class="btn" onclick="startGame()">再玩一次</button>
        </div>
    </div>

    <script>
        if (window.self !== window.top) {
            document.body.classList.add('iframe-mode');
        }

        const emojis = ['🐑', '🥕', '🍀', '🌸', '🍄', '⭐', '🔥', '💎', '🎵', '🍎', '🌙', '❤️'];
        let slot = [];
        let tiles = [];
        let shuffleCount = 3;

        function initGame() {
            // 生成成对的方块 (确保可以完全消除)
            const numTypes = 8;
            const tilesPerType = 9; // 每种 9 个，可以分成 3 组消除
            let tileArray = [];

            for (let i = 0; i < numTypes; i++) {
                for (let j = 0; j < tilesPerType; j++) {
                    tileArray.push(emojis[i]);
                }
            }

            // 打乱
            tileArray.sort(() => Math.random() - 0.5);

            // 创建 tile 对象，带层叠信息
            tiles = tileArray.map((emoji, index) => ({
                id: index,
                emoji,
                x: index % 8,
                y: Math.floor(index / 8),
                layer: Math.floor(Math.random() * 3),
                matched: false
            }));

            slot = [];
            shuffleCount = 3;
            updateSlot();
            renderTiles();
            updateProgress();
        }

        function updateSlot() {
            const slots = document.querySelectorAll('.slot');
            slots.forEach((slotEl, i) => {
                slotEl.textContent = slot[i] ? slot[i].emoji : '';
                slotEl.classList.toggle('filled', !!slot[i]);
            });
        }

        function renderTiles() {
            const area = document.getElementById('tileArea');
            area.innerHTML = '';

            // 按层排序渲染
            const sortedTiles = [...tiles].filter(t => !t.matched).sort((a, b) => a.layer - b.layer);

            sortedTiles.forEach(tile => {
                const el = document.createElement('div');
                el.className = 'tile';
                if (isTileDisabled(tile)) el.classList.add('disabled');
                el.textContent = tile.emoji;
                el.onclick = () => clickTile(tile);
                el.style.gridColumn = tile.x + 1;
                el.style.gridRow = tile.y + 1;
                el.style.zIndex = tile.layer;

                // 层叠偏移
                if (tile.layer > 0) {
                    el.style.transform = `translate(${tile.x * 2}px, ${tile.y * 2}px)`;
                }

                area.appendChild(el);
            });
        }

        function isTileDisabled(tile) {
            // 检查是否有其他方块覆盖这个方块
            for (let other of tiles) {
                if (other.matched || other.id === tile.id) continue;
                // 同一位置，更高层
                if (other.x === tile.x && other.y === tile.y && other.layer > tile.layer) {
                    return true;
                }
                // 相邻位置，更高层且覆盖
                if (other.layer > tile.layer &&
                    Math.abs(other.x - tile.x) <= 0.5 &&
                    Math.abs(other.y - tile.y) <= 0.5) {
                    return true;
                }
            }
            return false;
        }

        function clickTile(tile) {
            if (tile.matched || isTileDisabled(tile) || slot.length >= 7) return;

            // 移动到卡槽
            slot.push(tile);
            updateSlot();

            // 检查匹配
            const sameTiles = slot.filter(t => t.emoji === tile.emoji);
            if (sameTiles.length >= 3) {
                // 消除
                setTimeout(() => {
                    sameTiles.forEach(t => {
                        t.matched = true;
                        const idx = slot.indexOf(t);
                        if (idx !== -1) slot.splice(idx, 1);
                    });
                    updateSlot();
                    renderTiles();
                    updateProgress();
                    checkWin();
                }, 300);
            } else {
                renderTiles();

                // 检查游戏结束
                if (slot.length >= 7) {
                    setTimeout(gameOver, 500);
                }
            }
        }

        function shuffleTiles() {
            if (shuffleCount <= 0) return;

            // 重新打乱未匹配的方块位置
            const unmatched = tiles.filter(t => !t.matched);
            const emojis = unmatched.map(t => t.emoji);
            emojis.sort(() => Math.random() - 0.5);

            unmatched.forEach((tile, i) => {
                tile.emoji = emojis[i];
            });

            shuffleCount--;
            renderTiles();
        }

        function updateProgress() {
            const total = tiles.length;
            const matched = tiles.filter(t => t.matched).length;
            const percent = (matched / total) * 100;
            document.getElementById('progressFill').style.width = percent + '%';
        }

        function checkWin() {
            if (tiles.every(t => t.matched)) {
                document.getElementById('winScreen').style.display = 'block';
            }
        }

        function gameOver() {
            document.getElementById('gameOverScreen').style.display = 'block';
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('winScreen').style.display = 'none';
            initGame();
        }

        // 初始化
        renderTiles();
    </script>
</body>
</html>
