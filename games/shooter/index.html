<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空大战 - 打飞机</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }

        .game-wrapper {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .game-container {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(74, 222, 128, 0.3);
            border: 3px solid rgba(74, 222, 128, 0.3);
        }

        #gameCanvas {
            display: block;
            background: linear-gradient(180deg, #0a0a15 0%, #1a1a2e 100%);
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 160px;
        }

        .info-box {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .info-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #4ade80, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .info-value.health {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .info-value.coins {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
        }

        /* 技能栏 */
        .skill-bar {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .skill {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            position: relative;
            overflow: hidden;
        }

        .skill-cd {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            transition: height 0.1s;
        }

        .skill.ready {
            border-color: #4ade80;
            box-shadow: 0 0 10px #4ade80;
        }

        /* 游戏结束/开始弹窗 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay-title {
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #4ade80, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay-subtitle {
            font-size: 16px;
            color: #888;
            margin-bottom: 25px;
        }

        .overlay-stats {
            margin-bottom: 25px;
            text-align: center;
        }

        .overlay-stat {
            font-size: 20px;
            margin: 5px 0;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }

        .btn-start {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: white;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* 控制提示 */
        .controls-hint {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .controls-hint h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
        }

        .key-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .key {
            background: rgba(255,255,255,0.1);
            padding: 4px 8px;
            border-radius: 5px;
            font-weight: 600;
            font-size: 11px;
        }

        /* 移动端控制 */
        .mobile-controls {
            display: none;
            margin-top: 20px;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .mobile-btn {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 15px;
            background: rgba(74, 222, 128, 0.3);
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mobile-btn:active {
            transform: scale(0.9);
            background: rgba(74, 222, 128, 0.5);
        }

        .mobile-btn.fire {
            background: rgba(239, 68, 68, 0.5);
            width: 80px;
        }

        @media (max-width: 768px) {
            .game-wrapper {
                flex-direction: column;
                align-items: center;
            }

            .side-panel {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                min-width: auto;
            }

            .mobile-controls {
                display: flex;
            }

            .controls-hint {
                display: none;
            }
        }
    </style>
</head>
<body>
    <h1 style="margin-bottom: 20px; font-size: 32px;">🚀 太空大战</h1>

    <div class="game-wrapper">
        <!-- 左侧信息 -->
        <div class="side-panel">
            <div class="info-box">
                <div class="info-label">📊 得分</div>
                <div class="info-value" id="score">0</div>
            </div>

            <div class="info-box">
                <div class="info-label">❤️ 生命</div>
                <div class="info-value health" id="health">100</div>
            </div>

            <div class="info-box">
                <div class="info-label">🏆 最高分</div>
                <div class="info-value" id="highScore">0</div>
            </div>

            <div class="info-box">
                <div class="info-label">⚡ 技能</div>
                <div class="skill-bar">
                    <div class="skill" id="skill1" title="炸弹 (B)">
                        💣
                        <div class="skill-cd" style="height: 0%"></div>
                    </div>
                    <div class="skill" id="skill2" title="护盾 (S)">
                        🛡️
                        <div class="skill-cd" style="height: 0%"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 游戏主区域 -->
        <div class="game-container">
            <canvas id="gameCanvas" width="480" height="700"></canvas>

            <!-- 开始界面 -->
            <div class="overlay" id="startOverlay">
                <div style="font-size: 60px; margin-bottom: 15px;">🚀</div>
                <div class="overlay-title">太空大战</div>
                <div class="overlay-subtitle">消灭外星舰队，保卫地球！</div>
                <button class="btn btn-start" onclick="startGame()">开始战斗</button>
            </div>

            <!-- 游戏结束 -->
            <div class="overlay hidden" id="gameOverOverlay">
                <div style="font-size: 60px; margin-bottom: 15px;">💥</div>
                <div class="overlay-title">任务失败</div>
                <div class="overlay-stats">
                    <div class="overlay-stat">得分：<span id="finalScore" style="color: #4ade80;">0</span></div>
                    <div class="overlay-stat">击毁：<span id="finalKills" style="color: #ef4444;">0</span></div>
                    <div class="overlay-stat">等级：<span id="finalLevel" style="color: #fbbf24;">1</span></div>
                </div>
                <button class="btn btn-start" onclick="restartGame()">再战一次</button>
            </div>
        </div>
    </div>

    <!-- 移动端控制 -->
    <div class="mobile-controls">
        <button class="mobile-btn" onclick="moveLeft()">←</button>
        <button class="mobile-btn" onclick="moveUp()">↑</button>
        <button class="mobile-btn" onclick="moveDown()">↓</button>
        <button class="mobile-btn" onclick="moveRight()">→</button>
        <button class="mobile-btn fire" onclick="fire()">🔥</button>
        <button class="mobile-btn" onclick="useBomb()">💣</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏配置
        const PLAYER_WIDTH = 50;
        const PLAYER_HEIGHT = 60;
        const BULLET_SPEED = 10;
        const ENEMY_BASE_SPEED = 2;

        // 游戏状态
        let player = {
            x: canvas.width / 2 - PLAYER_WIDTH / 2,
            y: canvas.height - PLAYER_HEIGHT - 20,
            width: PLAYER_WIDTH,
            height: PLAYER_HEIGHT,
            speed: 6,
            health: 100,
            maxHealth: 100
        };

        let bullets = [];
        let enemies = [];
        let enemyBullets = [];
        let particles = [];
        let powerups = [];
        let stars = [];

        let score = 0;
        let kills = 0;
        let level = 1;
        let highScore = localStorage.getItem('shooterHighScore') || 0;
        let isGameRunning = false;
        let isGameOver = false;
        let frameCount = 0;

        // 技能
        let bombCooldown = 0;
        let shieldCooldown = 0;
        let hasShield = false;
        let bombMaxCooldown = 600; // 10 秒
        let shieldMaxCooldown = 900; // 15 秒

        document.getElementById('highScore').textContent = highScore;

        // 初始化星空背景
        function initStars() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 2 + 0.5,
                    brightness: Math.random()
                });
            }
        }

        // 绘制星空
        function drawStars() {
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }

                const alpha = 0.5 + star.brightness * 0.5;
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // 玩家飞机
        class Player {
            constructor() {
                this.x = canvas.width / 2 - PLAYER_WIDTH / 2;
                this.y = canvas.height - PLAYER_HEIGHT - 20;
                this.width = PLAYER_WIDTH;
                this.height = PLAYER_HEIGHT;
                this.speed = 6;
                this.health = 100;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);

                // 护盾效果
                if (hasShield) {
                    ctx.strokeStyle = `rgba(74, 222, 128, ${0.5 + Math.sin(frameCount * 0.2) * 0.3})`;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.width, 0, Math.PI * 2);
                    ctx.stroke();
                }

                // 飞机主体
                ctx.fillStyle = '#4ade80';
                ctx.beginPath();
                ctx.moveTo(0, -this.height / 2);
                ctx.lineTo(-this.width / 2, this.height / 2);
                ctx.lineTo(0, this.height / 2 - 15);
                ctx.lineTo(this.width / 2, this.height / 2);
                ctx.closePath();
                ctx.fill();

                // 驾驶舱
                ctx.fillStyle = '#22c55e';
                ctx.beginPath();
                ctx.moveTo(0, -this.height / 4);
                ctx.lineTo(-8, this.height / 4);
                ctx.lineTo(8, this.height / 4);
                ctx.closePath();
                ctx.fill();

                // 机翼细节
                ctx.fillStyle = '#16a34a';
                ctx.beginPath();
                ctx.moveTo(-this.width / 2, this.height / 4);
                ctx.lineTo(-this.width / 2 - 10, this.height / 2);
                ctx.lineTo(-this.width / 2, this.height / 2);
                ctx.closePath();
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(this.width / 2, this.height / 4);
                ctx.lineTo(this.width / 2 + 10, this.height / 2);
                ctx.lineTo(this.width / 2, this.height / 2);
                ctx.closePath();
                ctx.fill();

                // 引擎火焰
                const flameLength = 15 + Math.sin(frameCount * 0.5) * 10;
                const gradient = ctx.createLinearGradient(0, this.height / 2, 0, this.height / 2 + flameLength);
                gradient.addColorStop(0, '#fbbf24');
                gradient.addColorStop(0.5, '#f59e0b');
                gradient.addColorStop(1, 'rgba(245, 158, 11, 0)');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.moveTo(-10, this.height / 2 - 5);
                ctx.lineTo(0, this.height / 2 + flameLength);
                ctx.lineTo(10, this.height / 2 - 5);
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }

            move(dx, dy) {
                this.x += dx * this.speed;
                this.y += dy * this.speed;

                // 边界限制
                this.x = Math.max(0, Math.min(canvas.width - this.width, this.x));
                this.y = Math.max(0, Math.min(canvas.height - this.height, this.y));
            }
        }

        // 子弹
        class Bullet {
            constructor(x, y, angle = -Math.PI / 2, speed = BULLET_SPEED, isEnemy = false) {
                this.x = x;
                this.y = y;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.isEnemy = isEnemy;
                this.radius = isEnemy ? 6 : 4;
                this.damage = isEnemy ? 10 : 25;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                if (this.isEnemy) {
                    // 敌方子弹（红色）
                    ctx.fillStyle = '#ef4444';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                    ctx.fill();

                    // 光晕
                    ctx.fillStyle = 'rgba(239, 68, 68, 0.5)';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius + 5, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // 玩家子弹（绿色）
                    ctx.fillStyle = '#4ade80';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.radius, this.radius * 2, 0, 0, Math.PI * 2);
                    ctx.fill();

                    // 光晕
                    ctx.fillStyle = 'rgba(74, 222, 128, 0.5)';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.radius + 3, this.radius * 2 + 5, 0, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            }
        }

        // 敌人
        class Enemy {
            constructor(type) {
                this.type = type;
                this.x = Math.random() * (canvas.width - 50);
                this.y = -50;
                this.speed = ENEMY_BASE_SPEED + level * 0.5;

                switch(type) {
                    case 'basic':
                        this.width = 40;
                        this.height = 40;
                        this.health = 30;
                        this.score = 100;
                        this.color = '#ef4444';
                        break;
                    case 'fast':
                        this.width = 30;
                        this.height = 30;
                        this.health = 15;
                        this.speed *= 1.5;
                        this.score = 150;
                        this.color = '#f59e0b';
                        break;
                    case 'tank':
                        this.width = 60;
                        this.height = 60;
                        this.health = 100;
                        this.speed *= 0.5;
                        this.score = 300;
                        this.color = '#8b5cf6';
                        break;
                    case 'boss':
                        this.width = 120;
                        this.height = 100;
                        this.health = 500 + level * 100;
                        this.speed *= 0.3;
                        this.score = 1000;
                        this.color = '#dc2626';
                        break;
                }
                this.maxHealth = this.health;
            }

            update() {
                this.y += this.speed;

                // 左右移动
                if (this.type === 'basic' || this.type === 'fast') {
                    this.x += Math.sin(this.y * 0.02) * 2;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);

                // 根据类型绘制不同外形
                if (this.type === 'basic') {
                    // 基本敌人 - 三角形
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.moveTo(0, this.height / 2);
                    ctx.lineTo(-this.width / 2, -this.height / 2);
                    ctx.lineTo(this.width / 2, -this.height / 2);
                    ctx.closePath();
                    ctx.fill();

                    // 引擎
                    ctx.fillStyle = '#fbbf24';
                    ctx.beginPath();
                    ctx.arc(0, -this.height / 2, 8, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.type === 'fast') {
                    // 快速敌人 - 菱形
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.moveTo(0, this.height / 2);
                    ctx.lineTo(-this.width / 2, 0);
                    ctx.lineTo(0, -this.height / 2);
                    ctx.lineTo(this.width / 2, 0);
                    ctx.closePath();
                    ctx.fill();
                } else if (this.type === 'tank') {
                    // 坦克 - 六边形
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const angle = (Math.PI / 3) * i - Math.PI / 6;
                        const x = Math.cos(angle) * this.width / 2;
                        const y = Math.sin(angle) * this.height / 2;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.fill();

                    // 装甲细节
                    ctx.strokeStyle = '#a78bfa';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                } else if (this.type === 'boss') {
                    // Boss - 大型战舰
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.moveTo(0, this.height / 2);
                    ctx.lineTo(-this.width / 2, 0);
                    ctx.lineTo(-this.width / 3, -this.height / 2);
                    ctx.lineTo(this.width / 3, -this.height / 2);
                    ctx.lineTo(this.width / 2, 0);
                    ctx.closePath();
                    ctx.fill();

                    // Boss 核心
                    ctx.fillStyle = '#fbbf24';
                    ctx.beginPath();
                    ctx.arc(0, 0, 20, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 血条
                if (this.health < this.maxHealth) {
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(-this.width / 2, -this.height / 2 - 10, this.width, 5);
                    ctx.fillStyle = '#4ade80';
                    ctx.fillRect(-this.width / 2, -this.height / 2 - 10, this.width * (this.health / this.maxHealth), 5);
                }

                ctx.restore();
            }
        }

        // 粒子效果
        class Particle {
            constructor(x, y, color, speed = 5) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * speed;
                this.vy = (Math.random() - 0.5) * speed;
                this.life = 1;
                this.color = color;
                this.size = Math.random() * 5 + 2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.1; // 重力
                this.life -= 0.02;
            }

            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // 爆炸效果
        function createExplosion(x, y, color, count = 20) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        // 玩家飞机实例
        let playerInstance;

        function init() {
            playerInstance = new Player();
            bullets = [];
            enemies = [];
            enemyBullets = [];
            particles = [];
            powerups = [];
            score = 0;
            kills = 0;
            level = 1;
            frameCount = 0;
            bombCooldown = 0;
            shieldCooldown = 0;
            hasShield = false;
            isGameOver = false;
            updateUI();
            initStars();
        }

        function startGame() {
            document.getElementById('startOverlay').classList.add('hidden');
            init();
            isGameRunning = true;
            gameLoop();
        }

        function restartGame() {
            document.getElementById('gameOverOverlay').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('gameOverOverlay').classList.add('hidden');
                document.getElementById('startOverlay').classList.remove('hidden');
            }, 100);
        }

        function gameOver() {
            isGameRunning = false;
            isGameOver = true;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('shooterHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalKills').textContent = kills;
            document.getElementById('finalLevel').textContent = level;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        function spawnEnemy() {
            const rand = Math.random();
            let type = 'basic';

            if (level >= 3 && rand < 0.1) {
                type = 'boss';
            } else if (level >= 2 && rand < 0.3) {
                type = 'tank';
            } else if (rand < 0.5) {
                type = 'fast';
            }

            enemies.push(new Enemy(type));
        }

        function fire() {
            if (!isGameRunning) return;

            // 双发子弹
            bullets.push(new Bullet(playerInstance.x + 10, playerInstance.y));
            bullets.push(new Bullet(playerInstance.x + playerInstance.width - 10, playerInstance.y));

            // 等级高时增加第三发
            if (level >= 3) {
                bullets.push(new Bullet(playerInstance.x + playerInstance.width / 2, playerInstance.y - 10));
            }
        }

        function useBomb() {
            if (bombCooldown > 0 || !isGameRunning) return;

            // 清屏炸弹
            enemies.forEach(enemy => {
                createExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, enemy.color);
                score += enemy.score;
                kills++;
            });
            enemies = [];
            enemyBullets = [];

            bombCooldown = bombMaxCooldown;
            updateUI();
        }

        function useShield() {
            if (shieldCooldown > 0 || !isGameRunning) return;

            hasShield = true;
            shieldCooldown = shieldMaxCooldown;

            setTimeout(() => {
                hasShield = false;
            }, 5000); // 护盾持续 5 秒

            updateUI();
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('health').textContent = Math.max(0, Math.floor(playerInstance.health));

            // 更新技能冷却
            const bombSkill = document.getElementById('skill1');
            const shieldSkill = document.getElementById('skill2');

            if (bombCooldown > 0) {
                bombSkill.querySelector('.skill-cd').style.height = (bombCooldown / bombMaxCooldown * 100) + '%';
                bombSkill.classList.remove('ready');
            } else {
                bombSkill.querySelector('.skill-cd').style.height = '0%';
                bombSkill.classList.add('ready');
            }

            if (shieldCooldown > 0) {
                shieldSkill.querySelector('.skill-cd').style.height = (shieldCooldown / shieldMaxCooldown * 100) + '%';
                shieldSkill.classList.remove('ready');
            } else {
                shieldSkill.querySelector('.skill-cd').style.height = '0%';
                shieldSkill.classList.add('ready');
            }
        }

        function checkCollisions() {
            // 子弹击中敌人
            bullets.forEach((bullet, bi) => {
                enemies.forEach((enemy, ei) => {
                    if (bullet.x > enemy.x && bullet.x < enemy.x + enemy.width &&
                        bullet.y > enemy.y && bullet.y < enemy.y + enemy.height) {

                        enemy.health -= bullet.damage;
                        bullets.splice(bi, 1);
                        createExplosion(bullet.x, bullet.y, '#4ade80', 5);

                        if (enemy.health <= 0) {
                            createExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, enemy.color, 30);
                            score += enemy.score;
                            kills++;

                            // 升级
                            if (kills % 20 === 0) {
                                level++;
                            }
                        }
                    }
                });
            });

            // 敌人撞到玩家
            enemies.forEach((enemy, index) => {
                if (playerInstance.x < enemy.x + enemy.width &&
                    playerInstance.x + playerInstance.width > enemy.x &&
                    playerInstance.y < enemy.y + enemy.height &&
                    playerInstance.y + playerInstance.height > enemy.y) {

                    enemies.splice(index, 1);
                    createExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, enemy.color);

                    if (!hasShield) {
                        playerInstance.health -= 30;
                    }
                }
            });

            // 敌方子弹击中玩家
            enemyBullets.forEach((bullet, index) => {
                const dx = bullet.x - (playerInstance.x + playerInstance.width / 2);
                const dy = bullet.y - (playerInstance.y + playerInstance.height / 2);
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < playerInstance.width / 2) {
                    enemyBullets.splice(index, 1);

                    if (!hasShield) {
                        playerInstance.health -= bullet.damage;
                        createExplosion(playerInstance.x + playerInstance.width / 2, playerInstance.y + playerInstance.height / 2, '#ef4444', 10);
                    }
                }
            });

            // 清理死亡敌人
            enemies = enemies.filter(e => e.health > 0 && e.y < canvas.height + 50);

            // 检查游戏结束
            if (playerInstance.health <= 0) {
                createExplosion(playerInstance.x + playerInstance.width / 2, playerInstance.y + playerInstance.height / 2, '#4ade80', 50);
                gameOver();
            }
        }

        function gameLoop() {
            if (!isGameRunning) return;

            frameCount++;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制星空
            drawStars();

            // 生成敌人
            const spawnRate = Math.max(30, 100 - level * 10);
            if (frameCount % spawnRate === 0) {
                spawnEnemy();
            }

            // Boss 战
            if (level > 1 && kills % 20 === 0 && !enemies.some(e => e.type === 'boss')) {
                if (Math.random() < 0.02) {
                    enemies.push(new Enemy('boss'));
                }
            }

            // 敌方射击
            if (frameCount % 60 === 0) {
                enemies.forEach(enemy => {
                    if (Math.random() < 0.3) {
                        const angle = Math.atan2(
                            (playerInstance.y + playerInstance.height / 2) - (enemy.y + enemy.height / 2),
                            (playerInstance.x + playerInstance.width / 2) - (enemy.x + enemy.width / 2)
                        );
                        enemyBullets.push(new Bullet(
                            enemy.x + enemy.width / 2,
                            enemy.y + enemy.height / 2,
                            angle,
                            5,
                            true
                        ));
                    }
                });
            }

            // 更新和绘制子弹
            bullets = bullets.filter(b => b.y > -10 && b.y < canvas.height + 10);
            bullets.forEach(bullet => {
                bullet.update();
                bullet.draw();
            });

            // 更新和绘制敌方子弹
            enemyBullets = enemyBullets.filter(b => b.y > -10 && b.y < canvas.height + 10);
            enemyBullets.forEach(bullet => {
                bullet.update();
                bullet.draw();
            });

            // 更新和绘制敌人
            enemies.forEach(enemy => {
                enemy.update();
                enemy.draw();
            });

            // 更新和绘制粒子
            particles = particles.filter(p => p.life > 0);
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // 绘制玩家
            playerInstance.draw();

            // 碰撞检测
            checkCollisions();

            // 更新 UI
            updateUI();

            // 冷却减少
            if (bombCooldown > 0) bombCooldown--;
            if (shieldCooldown > 0) shieldCooldown--;

            requestAnimationFrame(gameLoop);
        }

        // 键盘控制
        const keys = {};
        let autoFireInterval = null;

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;

            if (e.key === ' ' && isGameRunning) {
                fire();
            }
            if (e.key === 'b' || e.key === 'B') {
                useBomb();
            }
            if (e.key === 's' || e.key === 'S') {
                useShield();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // 连续移动
        setInterval(() => {
            if (!isGameRunning) return;

            if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                playerInstance.move(-1, 0);
            }
            if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                playerInstance.move(1, 0);
            }
            if (keys['ArrowUp'] || keys['w'] || keys['W']) {
                playerInstance.move(0, -1);
            }
            if (keys['ArrowDown'] || keys['s'] || keys['S']) {
                playerInstance.move(0, 1);
            }
        }, 16);

        // 自动射击
        setInterval(() => {
            if (isGameRunning && keys[' ']) {
                fire();
            }
        }, 150);

        // 移动端控制函数
        function moveLeft() { playerInstance.move(-1, 0); }
        function moveRight() { playerInstance.move(1, 0); }
        function moveUp() { playerInstance.move(0, -1); }
        function moveDown() { playerInstance.move(0, 1); }
        function fire() {
            bullets.push(new Bullet(playerInstance.x + 10, playerInstance.y));
            bullets.push(new Bullet(playerInstance.x + playerInstance.width - 10, playerInstance.y));
        }
        function useBomb() { useBomb(); }

        // 初始化
        initStars();
        drawStars();
    </script>
</body>
</html>
