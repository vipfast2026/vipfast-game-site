<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃蛇大作战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
            padding: 20px;
            touch-action: none;
        }

        /* iframe 嵌入时的样式 */
        body.iframe-mode {
            padding: 10px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100%;
            height: 100%;
            overflow: hidden;
        }

        body.iframe-mode .game-container {
            padding: 15px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        body.iframe-mode #gameCanvas {
            width: 400px !important;
            height: 400px !important;
        }

        body.iframe-mode .game-header {
            margin-bottom: 10px;
        }

        body.iframe-mode .score-display,
        body.iframe-mode .speed-display,
        body.iframe-mode .high-score {
            font-size: 13px;
        }

        body.iframe-mode .controls {
            margin-top: 12px;
        }

        body.iframe-mode .btn {
            padding: 9px 18px;
            font-size: 13px;
        }

        /* 背景动画粒子 */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .bg-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(74, 222, 128, 0.5);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        .game-container {
            position: relative;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-header {
            width: 100%;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
        }

        .score-display {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .score-display::before {
            content: '🎯';
            font-size: 20px;
        }

        .score-display span {
            color: #4ade80;
            font-size: 22px;
            text-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
        }

        .high-score {
            font-size: 12px;
            color: #a0a0a0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .high-score::before {
            content: '🏆';
            font-size: 16px;
        }

        .high-score span {
            color: #fbbf24;
            font-weight: 700;
            font-size: 16px;
        }

        #gameCanvas {
            border: 3px solid rgba(74, 222, 128, 0.4);
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.3), inset 0 0 40px rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
            max-width: 100%;
            height: auto;
        }

        .canvas-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            position: relative;
            z-index: 100;
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
            white-space: nowrap;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-start {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: white;
            box-shadow: 0 4px 20px rgba(74, 222, 128, 0.4);
            z-index: 10;
        }

        .btn-start:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 30px rgba(74, 222, 128, 0.6);
        }

        .btn-start:active {
            transform: translateY(0) scale(0.98);
        }

        .btn-pause {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: white;
            box-shadow: 0 4px 20px rgba(251, 191, 36, 0.4);
        }

        .btn-pause:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 30px rgba(251, 191, 36, 0.6);
        }

        .btn-sound {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
        }

        .btn-sound:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 30px rgba(139, 92, 246, 0.6);
        }

        .btn-sound.muted {
            background: linear-gradient(135deg, #6b7280, #4b5563);
            box-shadow: 0 5px 25px rgba(107, 114, 128, 0.3);
        }

        /* 游戏结束弹窗 */
        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .game-over-overlay.active {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .game-over-icon {
            font-size: 50px;
            margin-bottom: 10px;
            animation: bounce 0.5s ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .game-over-title {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(239, 68, 68, 0.3);
        }

        .game-over-score {
            font-size: 18px;
            margin-bottom: 10px;
            color: #a0a0a0;
        }

        .game-over-score span {
            color: #4ade80;
            font-weight: 700;
            font-size: 24px;
            text-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
        }

        .new-high-score {
            color: #fbbf24;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .btn-restart {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: white;
            padding: 12px 35px;
            font-size: 16px;
            box-shadow: 0 4px 25px rgba(74, 222, 128, 0.5);
        }

        .btn-restart:hover {
            transform: translateY(-2px) scale(1.08);
            box-shadow: 0 8px 35px rgba(74, 222, 128, 0.7);
        }

        /* 移动端控制 */
        .mobile-controls {
            display: none;
            margin-top: 15px;
            gap: 10px;
        }

        .mobile-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(74, 222, 128, 0.3), rgba(34, 197, 94, 0.3));
            color: white;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(74, 222, 128, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .mobile-btn:active {
            transform: scale(0.9);
            background: linear-gradient(135deg, rgba(74, 222, 128, 0.5), rgba(34, 197, 94, 0.5));
        }

        .mobile-controls-row {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        @media (max-width: 768px) {
            .mobile-controls {
                display: flex;
                flex-direction: column;
            }

            .game-container {
                padding: 10px;
            }

            #gameCanvas {
                max-width: 100%;
                height: auto;
            }

            body.iframe-mode #gameCanvas {
                width: 280px !important;
                height: 280px !important;
            }

            body.iframe-mode .game-header {
                margin-bottom: 8px;
            }

            body.iframe-mode .score-display,
            body.iframe-mode .speed-display,
            body.iframe-mode .high-score {
                font-size: 11px;
            }

            body.iframe-mode .controls {
                margin-top: 10px;
                display: flex !important;
            }

            body.iframe-mode .btn {
                padding: 7px 14px;
                font-size: 11px;
            }

            .mobile-btn {
                width: 45px;
                height: 45px;
                font-size: 18px;
            }
        }

        /* 开始提示 */
        .start-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            padding: 25px 35px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            border: 1px solid rgba(74, 222, 128, 0.3);
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.2);
            pointer-events: none;
        }

        .start-hint.hidden {
            display: none !important;
        }

        .start-hint h3 {
            pointer-events: none;
            font-size: 22px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #4ade80, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .start-hint p {
            color: #a0a0a0;
            margin-bottom: 10px;
            font-size: 12px;
        }

        .key-hint {
            display: inline-block;
            background: linear-gradient(135deg, rgba(74, 222, 128, 0.2), rgba(34, 197, 94, 0.2));
            padding: 6px 14px;
            border-radius: 10px;
            margin: 0 4px;
            border: 1px solid rgba(74, 222, 128, 0.4);
            font-weight: 700;
            color: #4ade80;
        }

        /* 速度显示 */
        .speed-display {
            font-size: 14px;
            color: #a0a0a0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .speed-display::before {
            content: '⚡';
            font-size: 16px;
        }

        .speed-display span {
            color: #fbbf24;
            font-weight: 700;
        }

        /* 音效开关提示 */
        .sound-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            z-index: 1000;
            transition: transform 0.3s ease-out;
            box-shadow: 0 5px 25px rgba(139, 92, 246, 0.5);
        }

        .sound-toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <!-- 背景粒子 -->
    <div class="bg-particles" id="bgParticles"></div>

    <div class="game-container">
        <div class="game-header">
            <div class="score-display">得分：<span id="score">0</span></div>
            <div class="speed-display">速度：<span id="speedLevel">1</span></div>
            <div class="high-score">最高：<span id="highScore">0</span></div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="500" height="500"></canvas>

            <!-- 开始提示 -->
            <div class="start-hint" id="startHint">
                <h3>🐍 贪吃蛇大作战</h3>
                <p>使用 <span class="key-hint">↑</span> <span class="key-hint">↓</span> <span class="key-hint">←</span> <span class="key-hint">→</span> 控制方向</p>
                <p>或 <span class="key-hint">W</span> <span class="key-hint">A</span> <span class="key-hint">S</span> <span class="key-hint">D</span></p>
                <p style="margin-top: 15px; color: #4ade80;">点击"开始游戏"按钮开始</p>
            </div>

            <!-- 游戏结束 -->
            <div class="game-over-overlay" id="gameOverOverlay">
                <div class="game-over-icon">💀</div>
                <div class="game-over-title">游戏结束</div>
                <div class="game-over-score">你的得分：<span id="finalScore">0</span></div>
                <div class="new-high-score" id="newHighScore" style="display: none;">🎉 新纪录！🎉</div>
                <button class="btn btn-restart" onclick="restartGame()">再玩一次</button>
            </div>
        </div>

        <div class="controls">
            <button type="button" class="btn btn-start" id="startBtn" onclick="startGame()">🎮 开始游戏</button>
            <button type="button" class="btn btn-pause" onclick="pauseGame()">⏸️ 暂停</button>
            <button type="button" class="btn btn-sound" id="soundBtn" onclick="toggleSound()">🔊 音效</button>
        </div>

        <!-- 移动端控制 -->
        <div class="mobile-controls">
            <div class="mobile-controls-row">
                <button class="mobile-btn" onclick="setDirection('up')">↑</button>
            </div>
            <div class="mobile-controls-row">
                <button class="mobile-btn" onclick="setDirection('left')">←</button>
                <button class="mobile-btn" onclick="setDirection('down')">↓</button>
                <button class="mobile-btn" onclick="setDirection('right')">→</button>
            </div>
        </div>
    </div>

    <!-- 音效提示 -->
    <div class="sound-toast" id="soundToast"></div>

    <!-- 音频元素 -->
    <audio id="bgm" loop>
        <source src="data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA//uQZAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWgAAAA0AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA//uQZAAABpAAAACAAADSAAAAETEFNRTMuMTAwVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV//uQZAAABpAAAACAAADSAAAAEVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVQ==" />
    </audio>

    <script>
        // 检测是否在 iframe 中运行
        if (window.self !== window.top) {
            document.body.classList.add('iframe-mode');
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏配置
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        // 游戏状态
        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let gameSpeed = 100;
        let isGameRunning = false;
        let isPaused = false;
        let soundEnabled = localStorage.getItem('snakeSound') !== 'false';

        // 音效合成
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        // 播放音效函数
        function playSound(type) {
            if (!soundEnabled) return;

            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            switch(type) {
                case 'eat':
                    // 吃到食物的音效 - 高音"叮"
                    oscillator.frequency.setValueAtTime(880, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(1760, audioContext.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.1);
                    break;
                case 'move':
                    // 移动音效 - 轻微"嗒"
                    oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
                    gainNode.gain.setValueAtTime(0.05, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.03);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.03);
                    break;
                case 'gameover':
                    // 游戏结束音效 -  descending tone
                    oscillator.frequency.setValueAtTime(440, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(110, audioContext.currentTime + 0.5);
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.5);
                    break;
                case 'start':
                    // 开始游戏音效 - ascending arpeggio
                    [261.63, 329.63, 392, 523.25].forEach((freq, i) => {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.setValueAtTime(freq, audioContext.currentTime + i * 0.1);
                        gain.gain.setValueAtTime(0.2, audioContext.currentTime + i * 0.1);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + i * 0.1 + 0.15);
                        osc.start(audioContext.currentTime + i * 0.1);
                        osc.stop(audioContext.currentTime + i * 0.1 + 0.15);
                    });
                    break;
            }
        }

        // 初始化显示最高分
        document.getElementById('highScore').textContent = highScore;
        updateSoundButton();

        // 创建背景粒子
        function createParticles() {
            const container = document.getElementById('bgParticles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'bg-particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        // 初始化蛇
        function initSnake() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
        }

        // 生成食物
        function generateFood() {
            while (true) {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };

                let onSnake = false;
                for (let segment of snake) {
                    if (segment.x === food.x && segment.y === food.y) {
                        onSnake = true;
                        break;
                    }
                }
                if (!onSnake) break;
            }
        }

        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格
            ctx.strokeStyle = 'rgba(74, 222, 128, 0.08)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 绘制食物（发光效果）
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ef4444';
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            // 食物脉冲效果
            const pulse = Math.sin(Date.now() / 200) * 3;
            ctx.shadowBlur = 15 + pulse;

            // 绘制蛇
            snake.forEach((segment, index) => {
                if (index === 0) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#4ade80';
                    ctx.fillStyle = '#4ade80';
                } else {
                    const gradient = index / snake.length;
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = `rgba(74, 222, 128, ${1 - gradient * 0.4})`;
                }

                const x = segment.x * gridSize + 1;
                const y = segment.y * gridSize + 1;
                const size = gridSize - 2;
                const radius = index === 0 ? 8 : 5;

                ctx.beginPath();
                ctx.moveTo(x + radius, y);
                ctx.lineTo(x + size - radius, y);
                ctx.quadraticCurveTo(x + size, y, x + size, y + radius);
                ctx.lineTo(x + size, y + size - radius);
                ctx.quadraticCurveTo(x + size, y + size, x + size - radius, y + size);
                ctx.lineTo(x + radius, y + size);
                ctx.quadraticCurveTo(x, y + size, x, y + size - radius);
                ctx.lineTo(x, y + radius);
                ctx.quadraticCurveTo(x, y, x + radius, y);
                ctx.closePath();
                ctx.fill();

                // 蛇头眼睛
                if (index === 0) {
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = 'white';

                    let eyeOffsetX1, eyeOffsetY1, eyeOffsetX2, eyeOffsetY2;

                    if (direction.x === 1) {
                        eyeOffsetX1 = 12; eyeOffsetY1 = 5;
                        eyeOffsetX2 = 12; eyeOffsetY2 = 12;
                    } else if (direction.x === -1) {
                        eyeOffsetX1 = 5; eyeOffsetY1 = 5;
                        eyeOffsetX2 = 5; eyeOffsetY2 = 12;
                    } else if (direction.y === -1) {
                        eyeOffsetX1 = 5; eyeOffsetY1 = 5;
                        eyeOffsetX2 = 12; eyeOffsetY2 = 5;
                    } else {
                        eyeOffsetX1 = 5; eyeOffsetY1 = 12;
                        eyeOffsetX2 = 12; eyeOffsetY2 = 12;
                    }

                    ctx.beginPath();
                    ctx.arc(segment.x * gridSize + eyeOffsetX1, segment.y * gridSize + eyeOffsetY1, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(segment.x * gridSize + eyeOffsetX2, segment.y * gridSize + eyeOffsetY2, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            ctx.shadowBlur = 0;
        }

        // 更新游戏状态
        function update() {
            direction = { ...nextDirection };

            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            if (head.x < 0) head.x = tileCount - 1;
            if (head.x >= tileCount) head.x = 0;
            if (head.y < 0) head.y = tileCount - 1;
            if (head.y >= tileCount) head.y = 0;

            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);
            playSound('move');

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                playSound('eat');
                generateFood();

                if (gameSpeed > 50) {
                    clearInterval(gameLoop);
                    gameSpeed -= 1;
                    gameLoop = setInterval(gameStep, gameSpeed);
                    updateSpeedLevel();
                }
            } else {
                snake.pop();
            }
        }

        function updateSpeedLevel() {
            const level = Math.floor((100 - gameSpeed) / 5) + 1;
            document.getElementById('speedLevel').textContent = level;
        }

        function gameStep() {
            if (!isPaused) {
                update();
                draw();
            }
        }

        function startGame() {
            if (isGameRunning) return;

            // 恢复音频上下文
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            initSnake();
            generateFood();
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameSpeed = 100;
            isPaused = false;

            document.getElementById('score').textContent = score;
            document.getElementById('startHint').classList.add('hidden');
            document.getElementById('speedLevel').textContent = '1';

            isGameRunning = true;
            gameLoop = setInterval(gameStep, gameSpeed);
            playSound('start');
        }

        function pauseGame() {
            if (!isGameRunning) return;
            isPaused = !isPaused;
        }

        function gameOver() {
            clearInterval(gameLoop);
            isGameRunning = false;

            playSound('gameover');

            let isNewHighScore = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
                isNewHighScore = true;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('newHighScore').style.display = isNewHighScore ? 'block' : 'none';
            document.getElementById('gameOverOverlay').classList.add('active');
        }

        function restartGame() {
            document.getElementById('gameOverOverlay').classList.remove('active');
            startGame();
        }

        function setDirection(dir) {
            switch(dir) {
                case 'up':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'down':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'left':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'right':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            localStorage.setItem('snakeSound', soundEnabled);
            updateSoundButton();

            const toast = document.getElementById('soundToast');
            toast.textContent = soundEnabled ? '🔊 音效已开启' : '🔇 音效已关闭';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function updateSoundButton() {
            const btn = document.getElementById('soundBtn');
            if (soundEnabled) {
                btn.textContent = '🔊 音效';
                btn.classList.remove('muted');
            } else {
                btn.textContent = '🔇 静音';
                btn.classList.add('muted');
            }
        }

        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;

            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    setDirection('up');
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    setDirection('down');
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    setDirection('left');
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    setDirection('right');
                    e.preventDefault();
                    break;
                case ' ':
                    pauseGame();
                    e.preventDefault();
                    break;
            }
        });

        // 触摸滑动控制
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
            if (!isGameRunning) return;

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            if (Math.abs(dx) > Math.abs(dy)) {
                // 水平滑动
                if (dx > 30) {
                    setDirection('right');
                } else if (dx < -30) {
                    setDirection('left');
                }
            } else {
                // 垂直滑动
                if (dy > 30) {
                    setDirection('down');
                } else if (dy < -30) {
                    setDirection('up');
                }
            }

            e.preventDefault();
        }, { passive: false });

        initSnake();
        generateFood();
        draw();
    </script>
</body>
</html>
