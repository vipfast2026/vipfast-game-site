<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>糖果消消乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }

        .game-container {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px 25px;
            background: rgba(255,255,255,0.3);
            border-radius: 15px;
        }

        .score-box {
            text-align: center;
        }

        .score-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 28px;
            font-weight: 900;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .score-value.small {
            font-size: 20px;
        }

        #gameBoard {
            display: grid;
            grid-template-columns: repeat(8, 55px);
            grid-template-rows: repeat(8, 55px);
            gap: 4px;
            padding: 15px;
            background: rgba(255,255,255,0.3);
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .candy {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            transition: all 0.2s;
            user-select: none;
            position: relative;
        }

        .candy:hover {
            transform: scale(1.1);
            z-index: 10;
        }

        .candy.selected {
            animation: pulse 0.5s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(255,255,255,0.8);
        }

        .candy.match {
            animation: pop 0.3s ease-out forwards;
        }

        .candy.fall {
            animation: fall 0.5s ease-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); }
            100% { transform: scale(0); opacity: 0; }
        }

        @keyframes fall {
            0% { transform: translateY(-50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        /* 游戏结束弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            color: #333;
            max-width: 400px;
            animation: modalIn 0.3s ease-out;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .modal-title {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 15px;
        }

        .modal-score {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #fa709a, #fee140);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }

        .modal-message {
            font-size: 16px;
            color: #666;
            margin-bottom: 25px;
        }

        /* 糖果颜色 */
        .candy-red { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); }
        .candy-green { background: linear-gradient(135deg, #51cf66, #40c057); }
        .candy-blue { background: linear-gradient(135deg, #339af0, #228be6); }
        .candy-yellow { background: linear-gradient(135deg, #ffd43b, #fcc419); }
        .candy-purple { background: linear-gradient(135deg, #da77f2, #cc5de8); }
        .candy-orange { background: linear-gradient(135deg, #ff922b, #fd7e14); }

        /* 连击提示 */
        .combo-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: 900;
            text-shadow: 0 0 30px rgba(255,255,255,0.8);
            pointer-events: none;
            z-index: 50;
            animation: comboPop 0.8s ease-out forwards;
        }

        @keyframes comboPop {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        /* 移动步数 */
        .moves-display {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 15px 25px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 15px;
        }

        .moves-label {
            font-size: 12px;
            opacity: 0.8;
        }

        .moves-value {
            font-size: 24px;
            font-weight: 900;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="score-box">
                <div class="score-label">🎯 目标分数</div>
                <div class="score-value small" id="targetScore">2000</div>
            </div>
            <div class="score-box">
                <div class="score-label">⭐ 当前分数</div>
                <div class="score-value" id="currentScore">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">🏆 最高分</div>
                <div class="score-value small" id="bestScore">0</div>
            </div>
        </div>

        <div class="moves-display">
            <div class="moves-label">剩余步数</div>
            <div class="moves-value" id="movesLeft">20</div>
        </div>

        <div id="gameBoard"></div>

        <div class="controls">
            <button class="btn btn-secondary" onclick="shuffleBoard()">🔀 重置</button>
            <button class="btn btn-primary" onclick="newGame()">🎮 新游戏</button>
        </div>
    </div>

    <!-- 游戏结束弹窗 -->
    <div class="modal-overlay" id="gameOverModal">
        <div class="modal">
            <div class="modal-icon" id="modalIcon">🎉</div>
            <div class="modal-title" id="modalTitle">恭喜通关!</div>
            <div class="modal-score" id="modalScore">2500</div>
            <div class="modal-message" id="modalMessage">太棒了！你达成了目标!</div>
            <button class="btn btn-primary" onclick="newGame()">再玩一次</button>
        </div>
    </div>

    <script>
        // 游戏配置
        const BOARD_SIZE = 8;
        const CANDY_TYPES = ['🍎', '🍊', '🍋', '🍇', '🫐', '🍑'];
        const CANDY_COLORS = ['red', 'green', 'yellow', 'purple', 'blue', 'orange'];
        const TARGET_SCORE = 2000;
        const MAX_MOVES = 20;

        // 游戏状态
        let board = [];
        let selectedCandy = null;
        let score = 0;
        let moves = 0;
        let bestScore = localStorage.getItem('match3BestScore') || 0;
        let isProcessing = false;

        // 初始化
        document.getElementById('bestScore').textContent = bestScore;

        function getRandomCandy() {
            const index = Math.floor(Math.random() * CANDY_TYPES.length);
            return {
                type: CANDY_TYPES[index],
                color: CANDY_COLORS[index],
                id: Math.random().toString(36).substr(2, 9)
            };
        }

        function initBoard() {
            board = [];
            for (let row = 0; row < BOARD_SIZE; row++) {
                board[row] = [];
                for (let col = 0; col < BOARD_SIZE; col++) {
                    let candy;
                    // 避免初始就有匹配
                    do {
                        candy = getRandomCandy();
                    } while (
                        (col >= 2 && board[row][col-1].type === candy.type && board[row][col-2].type === candy.type) ||
                        (row >= 2 && board[row-1][col]?.type === candy.type && board[row-2][col]?.type === candy.type)
                    );
                    board[row][col] = candy;
                }
            }
        }

        function renderBoard() {
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';

            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    const candy = board[row][col];
                    const cell = document.createElement('div');
                    cell.className = `candy candy-${candy.color}`;
                    cell.textContent = candy.type;
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    cell.onclick = () => handleCandyClick(row, col);
                    gameBoard.appendChild(cell);
                }
            }
        }

        function handleCandyClick(row, col) {
            if (isProcessing || moves <= 0) return;

            const clicked = { row, col };

            if (!selectedCandy) {
                // 第一次选择
                selectedCandy = clicked;
                highlightSelected();
            } else {
                // 第二次选择，检查是否相邻
                const dr = Math.abs(selectedCandy.row - row);
                const dc = Math.abs(selectedCandy.col - col);

                if (dr + dc === 1) {
                    // 相邻，交换
                    swapCandies(selectedCandy, clicked);
                } else {
                    // 不相邻，重新选择
                    selectedCandy = clicked;
                    highlightSelected();
                    return;
                }
                selectedCandy = null;
            }
        }

        function highlightSelected() {
            document.querySelectorAll('.candy').forEach(c => c.classList.remove('selected'));
            if (selectedCandy) {
                const index = selectedCandy.row * BOARD_SIZE + selectedCandy.col;
                document.querySelectorAll('.candy')[index].classList.add('selected');
            }
        }

        async function swapCandies(pos1, pos2) {
            isProcessing = true;

            // 交换数据
            const temp = board[pos1.row][pos1.col];
            board[pos1.row][pos1.col] = board[pos2.row][pos2.col];
            board[pos2.row][pos2.col] = temp;

            renderBoard();

            // 检查是否有匹配
            await sleep(200);
            const matches = findAllMatches();

            if (matches.length > 0) {
                moves--;
                updateMoves();
                await processMatches(matches);
            } else {
                // 没有匹配，换回来
                await sleep(200);
                const temp = board[pos1.row][pos1.col];
                board[pos1.row][pos1.col] = board[pos2.row][pos2.col];
                board[pos2.row][pos2.col] = temp;
                renderBoard();
                isProcessing = false;
            }
        }

        function findAllMatches() {
            const matches = new Set();

            // 水平匹配
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE - 2; col++) {
                    const type = board[row][col].type;
                    if (board[row][col+1].type === type && board[row][col+2].type === type) {
                        matches.add(`${row},${col}`);
                        matches.add(`${row},${col+1}`);
                        matches.add(`${row},${col+2}`);
                    }
                }
            }

            // 垂直匹配
            for (let col = 0; col < BOARD_SIZE; col++) {
                for (let row = 0; row < BOARD_SIZE - 2; row++) {
                    const type = board[row][col].type;
                    if (board[row+1][col]?.type === type && board[row+2][col]?.type === type) {
                        matches.add(`${row},${col}`);
                        matches.add(`${row+1},${col}`);
                        matches.add(`${row+2},${col}`);
                    }
                }
            }

            return Array.from(matches).map(s => {
                const [row, col] = s.split(',').map(Number);
                return { row, col };
            });
        }

        async function processMatches(matches) {
            let combo = 1;

            while (matches.length > 0) {
                // 标记匹配
                const cells = document.querySelectorAll('.candy');
                matches.forEach(m => {
                    const index = m.row * BOARD_SIZE + m.col;
                    cells[index].classList.add('match');
                });

                // 计算分数
                const points = matches.length * 10 * combo;
                score += points;
                updateScore();

                // 显示连击
                if (combo > 1) {
                    showCombo(combo);
                }

                await sleep(300);

                // 移除匹配的糖果
                matches.forEach(m => {
                    board[m.row][m.col] = null;
                });

                // 下落
                await dropCandies();

                // 填充新糖果
                await fillBoard();

                renderBoard();
                await sleep(300);

                // 检查是否有新的匹配
                matches = findAllMatches();
                combo++;
            }

            // 检查游戏结束
            checkGameState();
            isProcessing = false;
        }

        async function dropCandies() {
            for (let col = 0; col < BOARD_SIZE; col++) {
                let emptyRow = BOARD_SIZE - 1;
                for (let row = BOARD_SIZE - 1; row >= 0; row--) {
                    if (board[row][col] !== null) {
                        board[emptyRow][col] = board[row][col];
                        if (emptyRow !== row) {
                            board[row][col] = null;
                        }
                        emptyRow--;
                    }
                }
            }
        }

        async function fillBoard() {
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    if (board[row][col] === null) {
                        board[row][col] = getRandomCandy();
                    }
                }
            }
        }

        function showCombo(combo) {
            const comboEl = document.createElement('div');
            comboEl.className = 'combo-display';
            comboEl.textContent = `${combo} COMBO!`;
            comboEl.style.background = 'linear-gradient(135deg, #fa709a, #fee140)';
            comboEl.style.webkitBackgroundClip = 'text';
            comboEl.style.webkitTextFillColor = 'transparent';
            document.body.appendChild(comboEl);
            setTimeout(() => comboEl.remove(), 800);
        }

        function updateScore() {
            document.getElementById('currentScore').textContent = score;
        }

        function updateMoves() {
            document.getElementById('movesLeft').textContent = moves;
        }

        function checkGameState() {
            if (moves <= 0) {
                // 游戏结束
                setTimeout(() => {
                    const modal = document.getElementById('gameOverModal');
                    const icon = document.getElementById('modalIcon');
                    const title = document.getElementById('modalTitle');
                    const message = document.getElementById('modalMessage');

                    if (score >= TARGET_SCORE) {
                        icon.textContent = '🏆';
                        title.textContent = '恭喜通关!';
                        title.style.background = 'linear-gradient(135deg, #fa709a, #fee140)';
                        title.style.webkitBackgroundClip = 'text';
                        title.style.webkitTextFillColor = 'transparent';
                        message.textContent = '太棒了！你达成了目标分数!';
                    } else {
                        icon.textContent = '😢';
                        title.textContent = '游戏结束';
                        title.style.background = 'none';
                        title.style.webkitTextFillColor = '#333';
                        message.textContent = '别灰心，再试一次吧!';
                    }

                    document.getElementById('modalScore').textContent = score;
                    modal.classList.add('active');

                    // 更新最高分
                    if (score > bestScore) {
                        bestScore = score;
                        localStorage.setItem('match3BestScore', bestScore);
                        document.getElementById('bestScore').textContent = bestScore;
                    }
                }, 500);
            }
        }

        function shuffleBoard() {
            if (isProcessing) return;
            initBoard();
            renderBoard();
            score = 0;
            moves = MAX_MOVES;
            updateScore();
            updateMoves();
        }

        function newGame() {
            document.getElementById('gameOverModal').classList.remove('active');
            shuffleBoard();
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // 初始化游戏
        initBoard();
        renderBoard();
        moves = MAX_MOVES;
        updateMoves();
    </script>
</body>
</html>
