<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇大作战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .game-container {
            position: relative;
            padding: 20px;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 10px;
        }

        .score-display {
            font-size: 24px;
            font-weight: 700;
        }

        .score-display span {
            color: #4ade80;
        }

        .high-score {
            font-size: 16px;
            color: #a0a0a0;
        }

        #gameCanvas {
            border: 3px solid rgba(74, 222, 128, 0.3);
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.2);
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-start {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: white;
        }

        .btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(74, 222, 128, 0.4);
        }

        .btn-pause {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: white;
        }

        /* 游戏结束弹窗 */
        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            z-index: 10;
        }

        .game-over-overlay.active {
            display: flex;
        }

        .game-over-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .game-over-title {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-over-score {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .game-over-score span {
            color: #4ade80;
            font-weight: 700;
        }

        .btn-restart {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: white;
            padding: 15px 40px;
            font-size: 18px;
        }

        /* 移动端控制 */
        .mobile-controls {
            display: none;
            margin-top: 20px;
            gap: 10px;
        }

        .mobile-btn {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 15px;
            background: rgba(74, 222, 128, 0.3);
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mobile-btn:active {
            transform: scale(0.9);
            background: rgba(74, 222, 128, 0.5);
        }

        .mobile-controls-row {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        @media (max-width: 768px) {
            .mobile-controls {
                display: flex;
                flex-direction: column;
            }

            .controls {
                display: none;
            }
        }

        /* 开始提示 */
        .start-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            padding: 30px 50px;
            border-radius: 20px;
            text-align: center;
            z-index: 5;
        }

        .start-hint h3 {
            font-size: 24px;
            margin-bottom: 15px;
        }

        .start-hint p {
            color: #a0a0a0;
            margin-bottom: 10px;
        }

        .key-hint {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            padding: 5px 12px;
            border-radius: 8px;
            margin: 0 3px;
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="score-display">得分：<span id="score">0</span></div>
            <div class="high-score">最高分：<span id="highScore">0</span></div>
        </div>

        <div style="position: relative;">
            <canvas id="gameCanvas" width="600" height="600"></canvas>

            <!-- 开始提示 -->
            <div class="start-hint" id="startHint">
                <h3>🐍 贪吃蛇大作战</h3>
                <p>使用 <span class="key-hint">↑</span> <span class="key-hint">↓</span> <span class="key-hint">←</span> <span class="key-hint">→</span> 控制方向</p>
                <p>或 <span class="key-hint">W</span> <span class="key-hint">A</span> <span class="key-hint">S</span> <span class="key-hint">D</span></p>
                <p style="margin-top: 15px; color: #4ade80;">点击"开始游戏"按钮开始</p>
            </div>

            <!-- 游戏结束 -->
            <div class="game-over-overlay" id="gameOverOverlay">
                <div class="game-over-icon">💀</div>
                <div class="game-over-title">游戏结束</div>
                <div class="game-over-score">你的得分：<span id="finalScore">0</span></div>
                <button class="btn btn-restart" onclick="restartGame()">再玩一次</button>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-start" onclick="startGame()">🎮 开始游戏</button>
            <button class="btn btn-pause" onclick="pauseGame()">⏸️ 暂停</button>
        </div>

        <!-- 移动端控制 -->
        <div class="mobile-controls">
            <div class="mobile-controls-row">
                <button class="mobile-btn" onclick="setDirection('up')">↑</button>
            </div>
            <div class="mobile-controls-row">
                <button class="mobile-btn" onclick="setDirection('left')">←</button>
                <button class="mobile-btn" onclick="setDirection('down')">↓</button>
                <button class="mobile-btn" onclick="setDirection('right')">→</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏配置
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        // 游戏状态
        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let gameSpeed = 100;
        let isGameRunning = false;
        let isPaused = false;

        // 初始化显示最高分
        document.getElementById('highScore').textContent = highScore;

        // 初始化蛇
        function initSnake() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
        }

        // 生成食物
        function generateFood() {
            while (true) {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };

                // 确保食物不在蛇身上
                let onSnake = false;
                for (let segment of snake) {
                    if (segment.x === food.x && segment.y === food.y) {
                        onSnake = true;
                        break;
                    }
                }
                if (!onSnake) break;
            }
        }

        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格（淡淡的）
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 绘制食物（发光效果）
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ef4444';
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;

            // 绘制蛇
            snake.forEach((segment, index) => {
                // 蛇头颜色不同
                if (index === 0) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#4ade80';
                    ctx.fillStyle = '#4ade80';
                } else {
                    // 渐变效果
                    const gradient = index / snake.length;
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = `rgba(74, 222, 128, ${1 - gradient * 0.5})`;
                }

                // 圆角矩形
                const x = segment.x * gridSize + 1;
                const y = segment.y * gridSize + 1;
                const size = gridSize - 2;
                const radius = index === 0 ? 8 : 5;

                ctx.beginPath();
                ctx.moveTo(x + radius, y);
                ctx.lineTo(x + size - radius, y);
                ctx.quadraticCurveTo(x + size, y, x + size, y + radius);
                ctx.lineTo(x + size, y + size - radius);
                ctx.quadraticCurveTo(x + size, y + size, x + size - radius, y + size);
                ctx.lineTo(x + radius, y + size);
                ctx.quadraticCurveTo(x, y + size, x, y + size - radius);
                ctx.lineTo(x, y + radius);
                ctx.quadraticCurveTo(x, y, x + radius, y);
                ctx.closePath();
                ctx.fill();

                // 蛇头眼睛
                if (index === 0) {
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = 'white';

                    let eyeOffsetX1, eyeOffsetY1, eyeOffsetX2, eyeOffsetY2;

                    if (direction.x === 1) { // 右
                        eyeOffsetX1 = 12; eyeOffsetY1 = 5;
                        eyeOffsetX2 = 12; eyeOffsetY2 = 12;
                    } else if (direction.x === -1) { // 左
                        eyeOffsetX1 = 5; eyeOffsetY1 = 5;
                        eyeOffsetX2 = 5; eyeOffsetY2 = 12;
                    } else if (direction.y === -1) { // 上
                        eyeOffsetX1 = 5; eyeOffsetY1 = 5;
                        eyeOffsetX2 = 12; eyeOffsetY2 = 5;
                    } else { // 下
                        eyeOffsetX1 = 5; eyeOffsetY1 = 12;
                        eyeOffsetX2 = 12; eyeOffsetY2 = 12;
                    }

                    ctx.beginPath();
                    ctx.arc(
                        segment.x * gridSize + eyeOffsetX1,
                        segment.y * gridSize + eyeOffsetY1,
                        2, 0, Math.PI * 2
                    );
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(
                        segment.x * gridSize + eyeOffsetX2,
                        segment.y * gridSize + eyeOffsetY2,
                        2, 0, Math.PI * 2
                    );
                    ctx.fill();
                }
            });
        }

        // 更新游戏状态
        function update() {
            direction = { ...nextDirection };

            // 计算新头部位置
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // 穿墙检测
            if (head.x < 0) head.x = tileCount - 1;
            if (head.x >= tileCount) head.x = 0;
            if (head.y < 0) head.y = tileCount - 1;
            if (head.y >= tileCount) head.y = 0;

            // 撞到自己检测
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // 吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                generateFood();

                // 加速
                if (gameSpeed > 50) {
                    clearInterval(gameLoop);
                    gameSpeed -= 1;
                    gameLoop = setInterval(gameStep, gameSpeed);
                }
            } else {
                snake.pop();
            }
        }

        // 游戏步骤
        function gameStep() {
            if (!isPaused) {
                update();
                draw();
            }
        }

        // 开始游戏
        function startGame() {
            if (isGameRunning) return;

            initSnake();
            generateFood();
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameSpeed = 100;
            isPaused = false;

            document.getElementById('score').textContent = score;
            document.getElementById('startHint').style.display = 'none';

            isGameRunning = true;
            gameLoop = setInterval(gameStep, gameSpeed);
        }

        // 暂停游戏
        function pauseGame() {
            if (!isGameRunning) return;
            isPaused = !isPaused;
        }

        // 游戏结束
        function gameOver() {
            clearInterval(gameLoop);
            isGameRunning = false;

            // 更新最高分
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.add('active');
        }

        // 重新开始
        function restartGame() {
            document.getElementById('gameOverOverlay').classList.remove('active');
            startGame();
        }

        // 设置方向（移动端）
        function setDirection(dir) {
            switch(dir) {
                case 'up':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'down':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'left':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'right':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;

            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    setDirection('up');
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    setDirection('down');
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    setDirection('left');
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    setDirection('right');
                    e.preventDefault();
                    break;
                case ' ':
                    pauseGame();
                    e.preventDefault();
                    break;
            }
        });

        // 初始绘制
        initSnake();
        generateFood();
        draw();
    </script>
</body>
</html>
